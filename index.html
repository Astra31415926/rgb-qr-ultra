<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB QR Ultra v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .neon-border-r { border-left: 3px solid #ff0000; }
        .neon-border-g { border-left: 3px solid #00ff00; }
        .neon-border-b { border-left: 3px solid #0000ff; }
        .glitch-flash { animation: flash 0.2s ease-out; }
        @keyframes flash { from { opacity: 0.5; filter: brightness(3); } to { opacity: 1; filter: brightness(1); } }
        canvas { image-rendering: pixelated; }
        .modal-content { max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-start mb-4 sticky top-0 bg-black/90 py-2 z-50 border-b border-white/10">
        <div>
            <h1 class="text-xl font-bold tracking-tighter">RGB QR <span class="text-xs opacity-50">v4.0</span></h1>
            <button onclick="location.reload()" class="text-[10px] uppercase tracking-widest opacity-50">Reset System</button>
        </div>
        <div id="live-qr-container" class="w-20 h-20 bg-zinc-900 border border-white/20 flex items-center justify-center overflow-hidden">
            <canvas id="mini-qr" class="w-full h-full"></canvas>
        </div>
    </header>

    <section class="space-y-2 mb-8">
        <textarea id="in-r" class="w-full bg-zinc-900 p-3 text-sm focus:outline-none neon-border-r" rows="2" placeholder="RED CHANNEL (КИРИЛИЦЯ OK)"></textarea>
        <textarea id="in-g" class="w-full bg-zinc-900 p-3 text-sm focus:outline-none neon-border-g" rows="2" placeholder="GREEN CHANNEL"></textarea>
        <textarea id="in-b" class="w-full bg-zinc-900 p-3 text-sm focus:outline-none neon-border-b" rows="2" placeholder="BLUE CHANNEL"></textarea>
        <button onclick="downloadQR()" class="w-full py-3 border border-white/20 text-xs uppercase tracking-widest hover:bg-white hover:text-black transition">Download Master Code</button>
    </section>

    <hr class="border-white/10 mb-8">

    <section>
        <div class="flex items-center gap-4 mb-4">
            <label class="px-4 py-2 border border-white/20 text-xs cursor-pointer uppercase">
                Upload Scan
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </label>
            <div id="scan-preview-wrap" class="hidden">
                <canvas id="scan-thumb" class="w-[60px] h-[60px] border border-white/20"></canvas>
            </div>
        </div>

        <div id="results" class="space-y-3">
            <div class="p-4 bg-zinc-900/50 neon-border-r">
                <span class="text-[10px] opacity-40 block mb-1">R-DATA</span>
                <div id="res-r" class="text-lg font-mono break-all">—</div>
            </div>
            <div class="p-4 bg-zinc-900/50 neon-border-g">
                <span class="text-[10px] opacity-40 block mb-1">G-DATA</span>
                <div id="res-g" class="text-lg font-mono break-all">—</div>
            </div>
            <div class="p-4 bg-zinc-900/50 neon-border-b">
                <span class="text-[10px] opacity-40 block mb-1">B-DATA</span>
                <div id="res-b" class="text-lg font-mono break-all">—</div>
            </div>
        </div>
    </section>

    <script>
        const inputs = ['in-r', 'in-g', 'in-b'].map(id => document.getElementById(id));
        const miniCanvas = document.getElementById('mini-qr');
        const fileInput = document.getElementById('file-input');

        // --- CORE: UTF-8 ENCODING ---
        function createQR(text) {
            const qr = qrcode(0, 'M');
            qr.addData(new TextEncoder().encode(text || " "), 'Byte');
            qr.make();
            return qr;
        }

        function updateLiveQR() {
            const qrs = inputs.map(i => createQR(i.value));
            const count = qrs[0].getModuleCount();
            const cellSize = 4;
            miniCanvas.width = miniCanvas.height = count * cellSize;
            const ctx = miniCanvas.getContext('2d');

            for (let r = 0; r < count; r++) {
                for (let c = 0; c < count; c++) {
                    const rgb = [qrs[0].isDark(r,c)?255:0, qrs[1].isDark(r,c)?255:0, qrs[2].isDark(r,c)?255:0];
                    ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
                    ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
                }
            }
        }

        inputs.forEach(el => el.addEventListener('input', updateLiveQR));

        // --- SCANNER: CHANNEL SEPARATION ---
        fileInput.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                const img = new Image();
                img.onload = () => {
                    processScan(img);
                    document.getElementById('scan-preview-wrap').classList.remove('hidden');
                    new Audio('https://www.soundjay.com/buttons/sounds/button-27.mp3').play().catch(()=>{});
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function processScan(img) {
            const thumb = document.getElementById('scan-thumb');
            thumb.width = thumb.height = 60;
            thumb.getContext('2d').drawImage(img, 0, 0, 60, 60);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0,0, canvas.width, canvas.height);

            const channels = ['res-r', 'res-g', 'res-b'];
            channels.forEach((id, idx) => {
                const mono = new Uint8ClampedArray(imgData.data.length);
                for(let i=0; i<imgData.data.length; i+=4) {
                    const val = imgData.data[i + idx]; // Extract R, G, or B
                    mono[i]=mono[i+1]=mono[i+2] = val > 128 ? 255 : 0;
                    mono[i+3] = 255;
                }
                const code = jsQR(mono, canvas.width, canvas.height);
                const el = document.getElementById(id);
                el.innerText = code ? new TextDecoder().decode(code.binaryData) : "ERR: NO SIGNAL";
                el.parentElement.classList.add('glitch-flash');
                setTimeout(() => el.parentElement.classList.remove('glitch-flash'), 300);
            });
        }

        function downloadQR() {
            const link = document.createElement('a');
            link.download = 'RGB_ULTRA_V4.png';
            link.href = miniCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
