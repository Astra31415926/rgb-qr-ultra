<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB QR Ultra v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #111;
            --text: #e0e0e0;
            --muted: #555;
            --r: #FF0000; --g: #00FF00; --b: #0000FF;
            --neon-w: 0 0 5px #fff, 0 0 10px #fff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 1px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; }

        /* Layout Structure */
        .view-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .view { 
            position: absolute; inset: 0; 
            display: flex; flex-direction: column; 
            opacity: 0; pointer-events: none; 
            transition: opacity 0.3s ease;
        }
        .view.active { opacity: 1; pointer-events: all; }

        /* Dashboard Header (Mobile Fixed) */
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.9);
            z-index: 50;
            min-height: 80px;
        }

        .qr-live-preview {
            width: 60px;
            height: 60px;
            background: #111;
            border: 1px solid #333;
            padding: 2px;
            image-rendering: pixelated;
        }

        /* Input Stack */
        .input-stack {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 6rem; /* Space for keyboard */
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-field {
            background: transparent;
            border: 1px solid #222;
            border-radius: 2px;
            color: #fff;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px; /* Prevents iOS zoom */
            resize: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: #fff; }
        
        .input-r:focus { border-color: var(--r); box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .input-g:focus { border-color: var(--g); box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        .input-b:focus { border-color: var(--b); box-shadow: 0 0 10px rgba(0,0,255,0.2); }

        /* Results & Scanner UI */
        .results-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
            overflow-y: auto;
        }

        .result-block {
            background: rgba(255,255,255,0.03);
            border-left: 2px solid #333;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem; /* Large readable font */
            word-break: break-all;
            min-height: 60px;
            transition: all 0.3s;
        }

        .result-r { border-color: var(--r); }
        .result-g { border-color: var(--g); }
        .result-b { border-color: var(--b); }

        /* Smart Preview (Scanner) */
        .scan-preview-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #333;
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .scan-preview-thumb:hover { opacity: 1; }

        /* Buttons */
        .btn {
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { border-color: #fff; box-shadow: var(--neon-w); }
        .btn-primary { background: #fff; color: #000; font-weight: 700; }
        .btn-primary:hover { background: #ccc; box-shadow: none; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; display: none; align-items: flex-start; justify-content: center;
            padding: 2rem; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-box {
            background: #0a0a0a;
            border: 1px solid #222;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            margin: auto 0;
        }

        /* Animations */
        @keyframes glitch {
            0% { transform: translate(0) } 
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch { animation: glitch 0.2s linear; }
        
        .scan-line {
            position: absolute; left: 0; width: 100%; height: 2px; 
            background: #fff; box-shadow: 0 0 10px #fff;
            top: 0; animation: scanMove 2s linear forwards;
        }
        @keyframes scanMove { to { top: 100%; } }

    </style>
</head>
<body>

    <!-- MENU VIEW -->
    <div class="view-container">
        <div id="menu-view" class="view active">
            <div class="flex-1 flex flex-col items-center justify-center p-6">
                <h1 class="text-5xl font-extrabold tracking-tighter mb-2">
                    <span style="color: var(--r)">R</span><span style="color: var(--g)">G</span><span style="color: var(--b)">B</span> QR
                </h1>
                <p class="text-xs text-gray-600 mb-12 tracking-widest">ULTRA v4.0</p>
                
                <div class="w-full max-w-xs space-y-4">
                    <button onclick="navigateTo('gen')" class="btn w-full text-left">Генерація (Live)</button>
                    <button onclick="navigateTo('scan')" class="btn w-full text-left">Сканер</button>
                </div>
            </div>
            <footer class="p-4 border-t border-gray-900 flex justify-center gap-4 text-xs">
                <button onclick="openModal('howto')" class="hover:text-white">Як користуватися</button>
                <button onclick="openModal('tech')" class="hover:text-white">Технологія</button>
                <button onclick="openModal('author')" class="hover:text-white">Автор</button>
            </footer>
        </div>

        <!-- GENERATOR VIEW (Mobile First) -->
        <div id="gen-view" class="view flex flex-col">
            <!-- Header Dashboard -->
            <div class="dash-header">
                <button onclick="navigateTo('menu')" class="text-xs text-gray-500 hover:text-white">&larr; Меню</button>
                <div class="text-center">
                    <span class="text-xs font-bold uppercase tracking-widest">Live Encode</span>
                </div>
                <!-- Live QR Preview (Fixed Top) -->
                <div class="qr-live-preview">
                    <canvas id="qr-mini-canvas" class="w-full h-full"></canvas>
                </div>
            </div>

            <!-- Input Stack (Optimized for Keyboard) -->
            <div class="input-stack">
                <div class="text-xs text-gray-600 mb-2 font-mono uppercase">Введіть дані (UTF-8)</div>
                
                <div style="border-left: 2px solid var(--r)">
                    <textarea id="input-r" class="input-field input-r" rows="2" placeholder="Red Channel"></textarea>
                </div>
                
                <div style="border-left: 2px solid var(--g)">
                    <textarea id="input-g" class="input-field input-g" rows="2" placeholder="Green Channel"></textarea>
                </div>
                
                <div style="border-left: 2px solid var(--b)">
                    <textarea id="input-b" class="input-field input-b" rows="2" placeholder="Blue Channel"></textarea>
                </div>

                <div class="mt-6">
                    <button id="btn-download" class="btn-primary btn w-full">Скачати PNG</button>
                </div>
            </div>
        </div>

        <!-- SCANNER VIEW -->
        <div id="scan-view" class="view flex flex-col">
            <div class="dash-header">
                <button onclick="navigateTo('menu')" class="text-xs text-gray-500 hover:text-white">&larr; Меню</button>
                <span class="text-xs font-bold uppercase tracking-widest">Spectral Analyzer</span>
                <div class="w-[60px]"></div> <!-- Spacer -->
            </div>

            <!-- Controls & Preview -->
            <div class="p-4 border-b border-gray-900 relative">
                <div id="scan-controls" class="flex gap-2">
                    <button onclick="startCamera()" class="btn flex-1">Камера</button>
                    <button onclick="document.getElementById('file-input').click()" class="btn flex-1">Файл</button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
                
                <!-- Hidden video stream -->
                <video id="video" class="hidden" playsinline></video>
                <!-- Smart Preview (Thumb) -->
                <img id="scan-preview-thumb" class="scan-preview-thumb hidden">
                <canvas id="scan-canvas" class="hidden"></canvas>
                <div id="scan-line-anim" class="hidden"></div>
            </div>

            <!-- Results Area -->
            <div class="results-container">
                <div id="res-r" class="result-block result-r">Червоний канал: очікування...</div>
                <div id="res-g" class="result-block result-g">Зелений канал: очікування...</div>
                <div id="res-b" class="result-block result-b">Синій канал: очікування...</div>
                
                <div id="status-text" class="text-center text-xs text-gray-700 mt-4 uppercase tracking-widest"></div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                <h2 id="modal-title" class="text-xl font-bold">Title</h2>
                <button onclick="closeModal()" class="text-2xl leading-none hover:text-red-500">&times;</button>
            </div>
            <div id="modal-content" class="text-sm text-gray-300 space-y-4 leading-relaxed font-mono"></div>
        </div>
    </div>

    <script>
        // ===== STATE & DATA =====
        const state = { lang: 'ua', stream: null, scanLoop: null };
        const content = {
            ua: {
                howto: { title: "Як користуватися", body: `<p>Система генерує три незалежні QR-коди в каналах R, G, B.</p><ul class="list-disc pl-5 mt-2"><li>Введіть текст у поля. Код генерується миттєво.</li><li>UTF-8 підтримується: кирилиця, емодзі.</li><li>Сканер розпізнає дані з камери або фото.</li></ul>` },
                tech: { title: "Технологія", body: `<p>Міжканальне кодування дозволяє зберігати в 3 рази більше даних.</p><p class="mt-2 text-yellow-400 text-xs">Увага: Друк потребує спектральної нормалізації. Метод описаний в розділі Автор.</p>` },
                author: { title: "Автор", body: `<p>Михайло Кашкаров — сайнс-арт художник.</p><p class="mt-2">Email: <a href="mailto:bakminsterfuler@gmail.com" class="text-white underline">bakminsterfuler@gmail.com</a></p><p class="mt-1">Site: <a href="https://astra31415926.github.io/" target="_blank" class="text-white underline">astra31415926.github.io</a></p>` }
            },
            en: { /* English content here */ }
        };

        // ===== UTILS =====
        const $ = id => document.getElementById(id);
        const playSound = (type) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.value = 0.1;
            if (type === 'shutter') { osc.frequency.value = 100; osc.type = 'square'; gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1); }
            else { osc.frequency.value = 880; osc.type = 'sine'; }
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        };

        // ===== NAVIGATION =====
        function navigateTo(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            $(`${viewId}-view`).classList.add('active');
        }

        // ===== GENERATION (UTF-8 Native) =====
        const qrMiniCanvas = $('qr-mini-canvas');
        const miniCtx = qrMiniCanvas.getContext('2d');
        const inputs = [$('input-r'), $('input-g'), $('input-b')];

        // Auto-resize & Live Update
        inputs.forEach(el => el.addEventListener('input', () => {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            generateLiveQR();
        }));

        function generateLiveQR() {
            const texts = inputs.map(i => i.value.trim() || ' ');
            
            // 1. Calculate Version
            let maxVer = 0;
            const qrs = texts.map(txt => {
                try {
                    const qr = qrcode(0, 'M');
                    qr.addData(unescape(encodeURIComponent(txt))); // UTF-8 Fix
                    qr.make();
                    maxVer = Math.max(maxVer, (qr.getModuleCount() - 17) / 4);
                    return qr;
                } catch(e) { return null; }
            });

            // 2. Render to Mini Canvas (Preview)
            // We assume sync version for stability, but for preview let's just draw what we have
            const modCount = qrs[0].getModuleCount();
            const size = 60; // Mini size
            const modSize = size / modCount;
            
            qrMiniCanvas.width = size;
            qrMiniCanvas.height = size;
            
            miniCtx.fillStyle = '#000';
            miniCtx.fillRect(0, 0, size, size);

            for(let y=0; y<modCount; y++) {
                for(let x=0; x<modCount; x++) {
                    const r = qrs[0].isDark(y, x) ? 255 : 0;
                    const g = qrs[1].isDark(y, x) ? 255 : 0;
                    const b = qrs[2].isDark(y, x) ? 255 : 0;
                    if(r+g+b > 0) {
                        miniCtx.fillStyle = `rgb(${r},${g},${b})`;
                        miniCtx.fillRect(x*modSize, y*modSize, modSize+0.5, modSize+0.5);
                    }
                }
            }
            
            // Store for download
            window.lastQRData = { qrs, modCount };
        }

        // Download Logic
        $('btn-download').addEventListener('click', () => {
            if (!window.lastQRData) return;
            const { qrs, modCount } = window.lastQRData;
            const size = 800; // High Res
            const modSize = size / modCount;
            
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,size,size);
            
            for(let y=0; y<modCount; y++) {
                for(let x=0; x<modCount; x++) {
                    const r = qrs[0].isDark(y, x) ? 255 : 0;
                    const g = qrs[1].isDark(y, x) ? 255 : 0;
                    const b = qrs[2].isDark(y, x) ? 255 : 0;
                    if(r+g+b > 0) {
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                        ctx.fillRect(x*modSize, y*modSize, modSize, modSize);
                    }
                }
            }

            const link = document.createElement('a');
            link.download = 'rgb-qr-v4.png';
            link.href = canvas.toDataURL('image/png');
            playSound('shutter');
            link.click();
        });

        // ===== SCANNER =====
        const video = $('video'), scanCanvas = $('scan-canvas');
        const ctxScan = scanCanvas.getContext('2d');
        const thumb = $('scan-preview-thumb');
        const status = $('status-text');

        async function startCamera() {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }});
                video.srcObject = state.stream;
                video.classList.remove('hidden');
                video.play();
                
                thumb.classList.add('hidden'); // Hide thumb in cam mode initially
                $('scan-controls').classList.add('hidden'); // Hide buttons
                
                tick();
            } catch(e) { alert("Camera error"); }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                scanCanvas.width = video.videoWidth;
                scanCanvas.height = video.videoHeight;
                ctxScan.drawImage(video, 0, 0);
                processFrame();
            }
            state.scanLoop = requestAnimationFrame(tick);
        }

        // File Handling
        $('file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                const img = new Image();
                img.onload = () => {
                    // Show thumb
                    thumb.src = evt.target.result;
                    thumb.classList.remove('hidden');
                    $('scan-controls').classList.add('hidden');
                    
                    // Prepare canvas
                    scanCanvas.width = img.width;
                    scanCanvas.height = img.height;
                    ctxScan.drawImage(img, 0, 0);
                    
                    // Animation
                    const line = document.createElement('div');
                    line.className = "scan-line";
                    $('scan-view').appendChild(line);
                    setTimeout(() => { line.remove(); processFrame(); }, 2000);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function processFrame() {
            const w = scanCanvas.width, h = scanCanvas.height;
            const data = ctxScan.getImageData(0, 0, w, h).data;
            
            // Channel Separation
            const chR = new Uint8ClampedArray(w*h*4);
            const chG = new Uint8ClampedArray(w*h*4);
            const chB = new Uint8ClampedArray(w*h*4);

            for(let i=0; i<data.length; i+=4) {
                chR[i] = chR[i+1] = chR[i+2] = data[i];
                chG[i] = chG[i+1] = chG[i+2] = data[i+1];
                chB[i] = chB[i+1] = chB[i+2] = data[i+2];
                chR[i+3] = chG[i+3] = chB[i+3] = 255;
            }

            const decode = (buffer, id, colorClass) => {
                const code = jsQR(new ImageData(buffer, w, h).data, w, h, { inversionAttempts: "attemptBoth" });
                const el = $(id);
                if (code) {
                    let text = code.data;
                    try { text = decodeURIComponent(escape(text)); } catch(e) {} // UTF-8 Decode
                    
                    el.innerText = text;
                    el.className = `result-block ${colorClass} glitch`;
                    setTimeout(() => el.classList.remove('glitch'), 200);
                }
            };

            decode(chR, 'res-r', 'result-r');
            decode(chG, 'res-g', 'result-g');
            decode(chB, 'res-b', 'result-b');
            
            playSound('success');
            status.innerText = "Сканування завершено";
        }

        // ===== MODALS =====
        function openModal(id) {
            const data = content[state.lang][id];
            $('modal-title').innerText = data.title;
            $('modal-content').innerHTML = data.body;
            $('modal-overlay').classList.add('active');
        }
        function closeModal() {
            $('modal-overlay').classList.remove('active');
        }

        // Initial generation
        generateLiveQR();
    </script>
</body>
</html>
