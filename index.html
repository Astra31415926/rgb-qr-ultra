<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB QR Ultra v3.2 | Spectral Encoding</title>
    
    <!-- Meta & OG -->
    <meta name="description" content="Advanced tool for encoding data in RGB channels of QR codes. Triple capacity.">
    <meta property="og:title" content="RGB QR Ultra">
    <meta property="og:image" content="https://astra31415926.github.io/rgb-qr-ultra/og-preview.png">
    <meta property="og:type" content="website">
    
    <!-- Favicon (RGB Cube SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='35' height='35' fill='%23ff004d'/><rect x='55' y='10' width='35' height='35' fill='%2300ff41'/><rect x='32' y='55' width='35' height='35' fill='%230088ff'/></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#09090b', // zinc-950
                        surface: '#18181b', // zinc-900
                        accent: {
                            red: '#ff004d',
                            green: '#00ff41',
                            blue: '#0088ff'
                        }
                    },
                    fontFamily: {
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }

        /* Dynamic Input Resizing */
        .input-dynamic {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            resize: none;
            overflow-y: auto;
        }
        
        /* Glassmorphism Cards */
        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scan Animation */
        @keyframes scan-flash {
            0% { opacity: 0; transform: scale(0.95); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.05); }
        }
        .flash-overlay {
            animation: scan-flash 0.4s ease-out;
        }

        /* Success Pulse */
        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }
        .scan-success {
            animation: success-pulse 0.8s ease-out;
        }
    </style>
</head>
<body class="h-screen flex flex-col font-body">

    <!-- ======================= -->
    <!-- NAVIGATION BAR (Mobile Bottom) -->
    <!-- ======================= -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 glass border-t border-white/10 md:top-0 md:bottom-auto md:border-b md:border-t-0">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-16 md:h-auto md:py-2">
            <!-- Logo (Hidden on Mobile Bottom Nav) -->
            <div class="hidden md:flex items-center space-x-2 px-4">
                <div class="flex space-x-1">
                    <div class="w-2 h-2 rounded-full bg-accent-red"></div>
                    <div class="w-2 h-2 rounded-full bg-accent-green"></div>
                    <div class="w-2 h-2 rounded-full bg-accent-blue"></div>
                </div>
                <span class="font-heading font-bold text-lg tracking-tight">RGB QR</span>
            </div>

            <!-- Tabs -->
            <button onclick="switchTab('gen')" id="tab-btn-gen" class="flex flex-col md:flex-row items-center justify-center w-full md:w-auto md:px-6 py-2 transition-colors text-white/50 hover:text-white focus:outline-none">
                <svg class="w-6 h-6 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
                <span class="text-xs mt-1 md:mt-0 md:text-sm font-medium">Генерація</span>
            </button>
            <button onclick="switchTab('scan')" id="tab-btn-scan" class="flex flex-col md:flex-row items-center justify-center w-full md:w-auto md:px-6 py-2 transition-colors text-white/50 hover:text-white focus:outline-none">
                <svg class="w-6 h-6 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-xs mt-1 md:mt-0 md:text-sm font-medium">Сканер</span>
            </button>
        </div>
    </nav>

    <!-- ======================= -->
    <!-- MAIN CONTENT AREA -->
    <!-- ======================= -->
    <main class="flex-1 overflow-y-auto pt-4 pb-20 md:pt-20 md:pb-4">

        <!-- TAB: GENERATOR -->
        <div id="tab-gen" class="max-w-4xl mx-auto px-4 hidden">
            <div class="flex flex-col-reverse md:flex-col h-full">
                
                <!-- QR OUTPUT AREA (Top on Mobile/Desktop) -->
                <div class="flex flex-col items-center justify-center flex-1 w-full my-4 relative">
                    <!-- Live Byte Counter & Status -->
                    <div class="text-center mb-4">
                        <div class="inline-flex items-center px-4 py-1 rounded-full glass text-xs text-white/70">
                            <span id="byte-counter">0 байт приховано в RGB-каналах</span>
                        </div>
                    </div>

                    <!-- QR Display Container -->
                    <div id="qr-container" class="relative w-full max-w-sm aspect-square bg-white/5 rounded-3xl overflow-hidden flex items-center justify-center border border-white/10 shadow-2xl transition-all duration-500">
                        <!-- Placeholder -->
                        <div id="qr-placeholder" class="text-center text-white/20 p-8">
                            <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                            <p class="font-mono text-sm">Введіть текст</p>
                        </div>
                        <!-- Canvas -->
                        <canvas id="qr-canvas" class="hidden w-full h-full p-4 object-contain"></canvas>
                    </div>

                    <!-- Download Button -->
                    <button onclick="downloadQR()" id="btn-download" class="mt-6 px-6 py-3 bg-white text-black font-bold rounded-xl text-sm uppercase tracking-wider hover:bg-zinc-200 transition-all opacity-0 pointer-events-none focus:outline-none">
                        Скачати PNG
                    </button>
                </div>

                <!-- INPUTS STACK (Optimized for Keyboard) -->
                <div id="inputs-wrapper" class="w-full space-y-2 transition-all duration-300">
                    <!-- Red Channel -->
                    <div class="input-group relative rounded-2xl overflow-hidden glass focus-within:bg-surface/80 focus-within:ring-1 focus-within:ring-accent-red">
                        <div class="flex items-center px-3 pt-2 text-accent-red text-xs font-mono">
                            <span class="w-2 h-2 bg-accent-red rounded-full mr-2"></span> RED CHANNEL
                        </div>
                        <textarea id="input-r" rows="1" class="input-dynamic w-full bg-transparent border-none p-3 text-sm text-white focus:outline-none placeholder-white/20" placeholder="Дані для червоного..."></textarea>
                    </div>

                    <!-- Green Channel -->
                    <div class="input-group relative rounded-2xl overflow-hidden glass focus-within:bg-surface/80 focus-within:ring-1 focus-within:ring-accent-green">
                        <div class="flex items-center px-3 pt-2 text-accent-green text-xs font-mono">
                            <span class="w-2 h-2 bg-accent-green rounded-full mr-2"></span> GREEN CHANNEL
                        </div>
                        <textarea id="input-g" rows="1" class="input-dynamic w-full bg-transparent border-none p-3 text-sm text-white focus:outline-none placeholder-white/20" placeholder="Дані для зеленого..."></textarea>
                    </div>

                    <!-- Blue Channel -->
                    <div class="input-group relative rounded-2xl overflow-hidden glass focus-within:bg-surface/80 focus-within:ring-1 focus-within:ring-accent-blue">
                        <div class="flex items-center px-3 pt-2 text-accent-blue text-xs font-mono">
                            <span class="w-2 h-2 bg-accent-blue rounded-full mr-2"></span> BLUE CHANNEL
                        </div>
                        <textarea id="input-b" rows="1" class="input-dynamic w-full bg-transparent border-none p-3 text-sm text-white focus:outline-none placeholder-white/20" placeholder="Дані для синього..."></textarea>
                    </div>
                </div>

            </div>
        </div>

        <!-- TAB: SCANNER -->
        <div id="tab-scan" class="max-w-4xl mx-auto px-4 hidden flex flex-col h-full">
            
            <!-- Camera/Source Area (Max 40% height on mobile) -->
            <div class="relative w-full h-[35vh] md:h-[40vh] bg-black/50 rounded-3xl overflow-hidden border border-white/10 flex items-center justify-center">
                
                <!-- Video Stream -->
                <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" playsinline></video>
                <canvas id="scan-canvas" class="hidden"></canvas>
                
                <!-- Targeting Frame -->
                <div id="scanner-frame" class="absolute w-48 h-48 border-2 border-white/30 rounded-2xl transition-all duration-300 hidden">
                    <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-accent-green rounded-tl-xl"></div>
                    <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-accent-green rounded-tr-xl"></div>
                    <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-accent-green rounded-bl-xl"></div>
                    <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-accent-green rounded-br-xl"></div>
                    <!-- Scanning line effect -->
                    <div class="scan-line w-full h-0.5 bg-accent-green/50 absolute top-0 shadow-lg" style="box-shadow: 0 0 10px #00ff41; top: 0%; animation: scanMove 2s linear infinite;"></div>
                </div>

                <!-- Controls (Overlaid) -->
                <div id="scan-controls" class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-base/80 backdrop-blur-sm transition-opacity">
                    <p class="text-white/50 mb-4 text-sm">Оберіть джерело</p>
                    <div class="flex gap-4">
                        <button onclick="startCamera()" class="flex flex-col items-center px-6 py-4 bg-surface hover:bg-zinc-800 rounded-2xl transition-colors focus:outline-none">
                            <svg class="w-8 h-8 mb-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span class="text-xs font-bold text-white/80">КАМЕРА</span>
                        </button>
                        <button onclick="document.getElementById('file-input').click()" class="flex flex-col items-center px-6 py-4 bg-surface hover:bg-zinc-800 rounded-2xl transition-colors focus:outline-none">
                            <svg class="w-8 h-8 mb-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-xs font-bold text-white/80">ФАЙЛ</span>
                        </button>
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                    </div>
                </div>

                <!-- Flash Overlay -->
                <div id="flash-overlay" class="absolute inset-0 bg-white z-30 opacity-0 pointer-events-none"></div>
            </div>

            <!-- Results Area (Remaining 60% height) -->
            <div class="flex-1 mt-4 space-y-3 overflow-y-auto pb-4">
                
                <!-- Header -->
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-white/40 uppercase tracking-wider">Результати декодування</span>
                    <button onclick="copyAllResults()" id="btn-copy-all" class="hidden text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded-lg transition-colors text-white">
                        Копіювати всі дані
                    </button>
                </div>

                <!-- Result Cards -->
                <div id="res-r-box" class="result-box w-full p-4 bg-surface border-l-4 border-accent-red rounded-xl min-h-[80px] flex flex-col justify-center transition-all">
                    <div class="text-[10px] font-bold text-accent-red mb-1 uppercase tracking-widest">Red Channel</div>
                    <div id="res-r" class="text-sm text-white/90 font-mono break-all">Очікування сигналу...</div>
                </div>

                <div id="res-g-box" class="result-box w-full p-4 bg-surface border-l-4 border-accent-green rounded-xl min-h-[80px] flex flex-col justify-center transition-all">
                    <div class="text-[10px] font-bold text-accent-green mb-1 uppercase tracking-widest">Green Channel</div>
                    <div id="res-g" class="text-sm text-white/90 font-mono break-all">Очікування сигналу...</div>
                </div>

                <div id="res-b-box" class="result-box w-full p-4 bg-surface border-l-4 border-accent-blue rounded-xl min-h-[80px] flex flex-col justify-center transition-all">
                    <div class="text-[10px] font-bold text-accent-blue mb-1 uppercase tracking-widest">Blue Channel</div>
                    <div id="res-b" class="text-sm text-white/90 font-mono break-all">Очікування сигналу...</div>
                </div>

                <div id="status-message" class="text-center text-white/30 text-xs pt-4"></div>
            </div>
        </div>

    </main>

    <style>
        @keyframes scanMove {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }
    </style>

    <script>
        // ========== STATE & CONFIG ==========
        const state = {
            lang: 'uk',
            stream: null,
            scanLoop: null,
            lastResults: { r: null, g: null, b: null },
            successTriggered: false,
            qrData: null
        };

        const $ = id => document.getElementById(id);

        // Audio Context for Shutter Sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playShutterSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 1200;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        // ========== NAVIGATION ==========
        function switchTab(tabName) {
            // Reset states
            if (state.stream) stopCamera();
            state.successTriggered = false;
            
            // UI Switching
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                if(el.classList.contains('max-w-4xl')) el.classList.add('hidden');
            });
            $(`tab-${tabName}`).classList.remove('hidden');

            // Active Tab Button Styling
            document.querySelectorAll('[id^="tab-btn-"]').forEach(btn => {
                btn.classList.remove('text-white', 'font-bold');
                btn.classList.add('text-white/50');
            });
            $(`tab-btn-${tabName}`).classList.remove('text-white/50');
            $(`tab-btn-${tabName}`).classList.add('text-white', 'font-bold');

            // Reset Scanner UI
            if(tabName === 'scan') {
                $('scan-controls').classList.remove('opacity-0', 'pointer-events-none');
                $('status-message').innerText = "";
                $('btn-copy-all').classList.add('hidden');
            }
        }

        // ========== GENERATOR LOGIC ==========
        const inputR = $('input-r');
        const inputG = $('input-g');
        const inputB = $('input-b');
        const inputs = [inputR, inputG, inputB];

        // Auto-resize textareas
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                // Resize logic
                input.style.height = 'auto';
                input.style.height = input.scrollHeight + 'px';
                
                // Generate QR
                liveGenerate();
            });

            // Focus Logic for Mobile Optimization
            input.addEventListener('focus', () => {
                // On mobile, collapse other elements to make room for keyboard
                // Logic can be expanded based on viewport height
            });
            input.addEventListener('blur', () => {
                // Restore layout
            });
        });

        // UTF-8 Encoder/Decoder
        const utf8_encode = str => unescape(encodeURIComponent(str));
        const utf8_decode = str => { try { return decodeURIComponent(escape(str)); } catch(e) { return str; } };

        function liveGenerate() {
            const rVal = inputR.value.trim() || ' ';
            const gVal = inputG.value.trim() || ' ';
            const bVal = inputB.value.trim() || ' ';

            if (!inputR.value && !inputG.value && !inputB.value) {
                $('qr-canvas').classList.add('hidden');
                $('qr-placeholder').classList.remove('hidden');
                $('byte-counter').innerText = "0 байт приховано";
                $('btn-download').classList.add('opacity-0', 'pointer-events-none');
                return;
            }

            // Calculate byte size
            const totalBytes = new Blob([inputR.value + inputG.value + inputB.value]).size;
            $('byte-counter').innerText = `+${totalBytes} байт приховано в RGB-каналах`;

            // Generate QR Logic
            let maxVer = 0;
            const dataArr = [rVal, gVal, bVal];
            
            // Find max version
            dataArr.forEach(txt => {
                try {
                    const qr = qrcode(0, 'M');
                    qr.addData(utf8_encode(txt));
                    qr.make();
                    maxVer = Math.max(maxVer, (qr.getModuleCount() - 17) / 4);
                } catch(e) {}
            });

            // Create QRs
            const qrs = dataArr.map(txt => {
                try {
                    const qr = qrcode(maxVer, 'M');
                    qr.addData(utf8_encode(txt));
                    qr.make();
                    return qr;
                } catch(e) { return null; }
            });

            // Render
            const canvas = $('qr-canvas');
            const ctx = canvas.getContext('2d');
            const modCount = qrs[0].getModuleCount();
            const size = 800; // High Res
            const margin = 4;
            const modSize = size / (modCount + margin * 2);

            canvas.width = size;
            canvas.height = size;
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, size, size);

            for(let y=0; y<modCount; y++) {
                for(let x=0; x<modCount; x++) {
                    const r = qrs[0].isDark(y, x) ? 255 : 0;
                    const g = qrs[1].isDark(y, x) ? 255 : 0;
                    const b = qrs[2].isDark(y, x) ? 255 : 0;
                    if(r+g+b > 0) {
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                        ctx.fillRect((x+margin)*modSize, (y+margin)*modSize, modSize, modSize);
                    }
                }
            }

            state.qrData = canvas.toDataURL('image/png');
            
            $('qr-canvas').classList.remove('hidden');
            $('qr-placeholder').classList.add('hidden');
            $('btn-download').classList.remove('opacity-0', 'pointer-events-none');
        }

        function downloadQR() {
            if(!state.qrData) return;
            const link = document.createElement('a');
            link.download = 'rgb-qr-ultra.png';
            link.href = state.qrData;
            link.click();
        }

        // ========== SCANNER LOGIC ==========
        const video = $('video');
        const scanCanvas = $('scan-canvas');
        const scanCtx = scanCanvas.getContext('2d');
        
        // File Input
        $('file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = evt => {
                processImage(evt.target.result);
            };
            reader.readAsDataURL(file);
        });

        function processImage(src) {
            const img = new Image();
            img.onload = () => {
                // Draw to hidden canvas
                scanCanvas.width = img.width;
                scanCanvas.height = img.height;
                scanCtx.drawImage(img, 0, 0);
                
                // Visual feedback (flash)
                triggerFlash();
                
                // Decode
                const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
                decodeAllChannels(imageData);
            };
            img.src = src;
        }

        async function startCamera() {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }});
                video.srcObject = state.stream;
                video.classList.remove('hidden');
                
                // UI Updates
                $('scan-controls').classList.add('opacity-0', 'pointer-events-none');
                $('scanner-frame').classList.remove('hidden');
                $('status-message').innerText = "Наведіть камеру на код";
                
                video.play();
                state.successTriggered = false;
                
                tick();
            } catch(e) {
                $('status-message').innerText = "Не вдалося отримати доступ до камери";
            }
        }

        function stopCamera() {
            if(state.stream) {
                state.stream.getTracks().forEach(track => track.stop());
                state.stream = null;
            }
            video.classList.add('hidden');
            $('scanner-frame').classList.add('hidden');
            $('scan-controls').classList.remove('opacity-0', 'pointer-events-none');
            if(state.scanLoop) cancelAnimationFrame(state.scanLoop);
        }

        function tick() {
            if(!state.stream) return;
            
            if(video.readyState === video.HAVE_ENOUGH_DATA) {
                scanCanvas.width = video.videoWidth;
                scanCanvas.height = video.videoHeight;
                scanCtx.drawImage(video, 0, 0);
                const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
                
                const found = decodeAllChannels(imageData, true); // Live mode
                
                // If found, we pause/resume or just keep running silently
                if(found && !state.successTriggered) {
                    state.successTriggered = true;
                    triggerFlash();
                    playShutterSound();
                    
                    // Visual Success State
                    $('scanner-frame').classList.add('scan-success');
                    setTimeout(() => $('scanner-frame').classList.remove('scan-success'), 800);
                    
                    // Optional: Stop camera after success?
                    // stopCamera(); 
                }
            }
            state.scanLoop = requestAnimationFrame(tick);
        }

        function decodeAllChannels(imageData, isLive = false) {
            const w = imageData.width;
            const h = imageData.height;
            const data = imageData.data;
            
            // Prepare Channel Buffers
            const rBuff = new Uint8ClampedArray(w*h*4);
            const gBuff = new Uint8ClampedArray(w*h*4);
            const bBuff = new Uint8ClampedArray(w*h*4);

            for(let i=0; i<data.length; i+=4) {
                rBuff[i] = rBuff[i+1] = rBuff[i+2] = data[i];
                gBuff[i] = gBuff[i+1] = gBuff[i+2] = data[i+1];
                bBuff[i] = bBuff[i+1] = bBuff[i+2] = data[i+2];
                rBuff[i+3] = gBuff[i+3] = bBuff[i+3] = 255;
            }

            // Decode
            const res = [
                decodeChannel(new ImageData(rBuff, w, h)),
                decodeChannel(new ImageData(gBuff, w, h)),
                decodeChannel(new ImageData(bBuff, w, h))
            ];

            let count = 0;
            const ids = ['res-r', 'res-g', 'res-b'];
            const boxes = ['res-r-box', 'res-g-box', 'res-b-box'];
            const colors = ['accent-red', 'accent-green', 'accent-blue'];

            res.forEach((val, idx) => {
                const el = $(ids[idx]);
                const box = $(boxes[idx]);
                if(val) {
                    count++;
                    const text = utf8_decode(val);
                    if(el.innerText !== text) {
                        el.innerText = text;
                        // Animation
                        box.classList.add('scale-[1.02]');
                        setTimeout(() => box.classList.remove('scale-[1.02]'), 200);
                    }
                }
            });

            if(count > 0) {
                $('status-message').innerText = `Успішно декодовано: ${count}/3`;
                $('btn-copy-all').classList.remove('hidden');
                return true;
            } else {
                if(!isLive) $('status-message').innerText = "QR-код не знайдено або канали порожні";
                return false;
            }
        }

        function decodeChannel(imgData) {
            const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "attemptBoth" });
            return code ? code.data : null;
        }

        function triggerFlash() {
            const flash = $('flash-overlay');
            flash.classList.add('flash-overlay');
            flash.style.opacity = 1;
            setTimeout(() => {
                flash.style.opacity = 0;
                flash.classList.remove('flash-overlay');
            }, 400);
        }

        function copyAllResults() {
            const r = $('res-r').innerText;
            const g = $('res-g').innerText;
            const b = $('res-b').innerText;
            const text = `RED:\n${r}\n\nGREEN:\n${g}\n\nBLUE:\n${b}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = $('btn-copy-all');
                const originalText = btn.innerText;
                btn.innerText = "Скопійовано!";
                setTimeout(() => btn.innerText = originalText, 2000);
            });
        }

        // Init
        switchTab('gen');

    </script>
</body>
