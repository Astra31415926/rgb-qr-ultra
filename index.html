<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR Ultra — Spectral Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --surface: #0f0f0f; --border: #1f1f1f; --text: #e0e0e0; --r-channel: #ff2a2a; --g-channel: #2aff2a; --b-channel: #2a9fff; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
        .input-rgb { background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: #fff; width: 100%; font-family: 'JetBrains Mono'; }
        canvas { image-rendering: pixelated; max-width: 100%; height: auto; }
        .hidden { display: none; }
        .result-item { padding: 10px; border-radius: 6px; margin-bottom: 8px; font-family: 'JetBrains Mono'; font-size: 13px; }
        .res-r { border: 1px solid var(--r-channel); color: var(--r-channel); }
        .res-g { border: 1px solid var(--g-channel); color: var(--g-channel); }
        .res-b { border: 1px solid var(--b-channel); color: var(--b-channel); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-black uppercase tracking-tighter">
            <span style="color:var(--r-channel)">R</span><span style="color:var(--g-channel)">G</span><span style="color:var(--b-channel)">B</span> QR ULTRA
        </h1>
    </header>

    <div class="grid md:grid-cols-2 gap-8 mb-12">
        <div class="space-y-4">
            <div class="card p-4"><label class="text-xs font-bold" style="color:var(--r-channel)">RED</label><textarea id="in-r" class="input-rgb" rows="1"></textarea></div>
            <div class="card p-4"><label class="text-xs font-bold" style="color:var(--g-channel)">GREEN</label><textarea id="in-g" class="input-rgb" rows="1"></textarea></div>
            <div class="card p-4"><label class="text-xs font-bold" style="color:var(--b-channel)">BLUE</label><textarea id="in-b" class="input-rgb" rows="1"></textarea></div>
            <button id="gen-btn" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:invert transition">ГЕНЕРИРОВАТЬ</button>
        </div>
        <div class="card flex flex-col items-center justify-center p-4 bg-black min-h-[300px]">
            <canvas id="qr-canvas" class="hidden"></canvas>
            <button id="dl-btn" class="hidden mt-4 text-xs border border-white px-4 py-2 rounded">СКАЧАТЬ PNG</button>
        </div>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
        <div class="card p-4">
            <h3 class="font-bold mb-4 uppercase text-sm">Сканер / Декодер</h3>
            <div class="flex gap-2 mb-4">
                <button id="cam-btn" class="flex-1 bg-zinc-800 py-2 rounded text-xs font-bold">ВКЛ КАМЕРУ</button>
                <button id="file-btn" class="flex-1 bg-zinc-800 py-2 rounded text-xs font-bold">ЗАГРУЗИТЬ ФОТО</button>
                <input type="file" id="file-input" accept="image/*" class="hidden">
            </div>
            <video id="video" class="hidden w-full rounded" playsinline></video>
            <canvas id="scan-canvas" class="hidden"></canvas>
            <div id="cam-idle" class="aspect-video bg-zinc-900 rounded flex items-center justify-center text-xs text-zinc-500">Камера или файл не выбраны</div>
        </div>
        <div>
            <h3 class="font-bold mb-4 uppercase text-sm">Результат расшифровки</h3>
            <div id="res-r" class="result-item res-r italic">RED: ожидание...</div>
            <div id="res-g" class="result-item res-g italic">GREEN: ожидание...</div>
            <div id="res-b" class="result-item res-b italic">BLUE: ожидание...</div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let stream = null;

    // ГЕНЕРАЦИЯ (Синхронная сетка)
    $('gen-btn').onclick = () => {
        const texts = [$('in-r').value || " ", $('in-g').value || " ", $('in-b').value || " "];
        let maxVer = 1;
        texts.forEach(t => {
            const q = qrcode(0, 'M'); q.addData(t); q.make();
            maxVer = Math.max(maxVer, (q.getModuleCount()-17)/4);
        });

        const qrs = texts.map(t => { 
            const q = qrcode(maxVer, 'M'); q.addData(t); q.make(); return q; 
        });

        const modCount = qrs[0].getModuleCount();
        const modSize = 10;
        const margin = 2;
        const size = (modCount + margin * 2) * modSize;
        const canvas = $('qr-canvas');
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,size,size);

        for(let y=0; y<modCount; y++) {
            for(let x=0; x<modCount; x++) {
                const r = qrs[0].isDark(y,x)?255:0;
                const g = qrs[1].isDark(y,x)?255:0;
                const b = qrs[2].isDark(y,x)?255:0;
                if(r||g||b) {
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect((x+margin)*modSize, (y+margin)*modSize, modSize, modSize);
                }
            }
        }
        canvas.classList.remove('hidden'); $('dl-btn').classList.remove('hidden');
    };

    $('dl-btn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'rgb-qr.png';
        link.href = $('qr-canvas').toDataURL();
        link.click();
    };

    // СКАНЕР (Логика каналов)
    function processFrame(source) {
        const canvas = $('scan-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = source.videoWidth || source.width;
        canvas.height = source.videoHeight || source.height;
        ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
        
        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const channels = [new Uint8ClampedArray(imgData.data.length), new Uint8ClampedArray(imgData.data.length), new Uint8ClampedArray(imgData.data.length)];
        
        for(let i=0; i<imgData.data.length; i+=4) {
            for(let c=0; c<3; c++) {
                const val = imgData.data[i+c];
                channels[c][i]=channels[c][i+1]=channels[c][i+2] = val;
                channels[c][i+3] = 255;
            }
        }

        const resIds = ['res-r', 'res-g', 'res-b'];
        channels.forEach((data, i) => {
            const code = jsQR(data, canvas.width, canvas.height);
            if(code) $(resIds[i]).innerText = `${['RED','GREEN','BLUE'][i]}: ${code.data}`;
        });
    }

    // КАМЕРА
    $('cam-btn').onclick = async () => {
        if(stream) { stopCam(); return; }
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        $('video').srcObject = stream;
        $('video').play();
        $('video').classList.remove('hidden'); $('cam-idle').classList.add('hidden');
        $('cam-btn').innerText = "СТОП";
        const loop = () => { if(stream) { processFrame($('video')); requestAnimationFrame(loop); } };
        loop();
    };

    function stopCam() {
        stream.getTracks().forEach(t => t.stop()); stream = null;
        $('video').classList.add('hidden'); $('cam-idle').classList.remove('hidden');
        $('cam-btn').innerText = "ВКЛ КАМЕРУ";
    }

    // ЗАГРУЗКА ФАЙЛА
    $('file-btn').onclick = () => $('file-input').click();
    $('file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                stopCam(); // Выключаем камеру если была
                processFrame(img);
                $('cam-idle').innerText = "Файл обработан";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
