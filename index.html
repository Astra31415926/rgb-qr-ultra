<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --r: #ff2a2a; --g: #2aff2a; --b: #2a9fff; }
        body { background: #050505; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .btn-main { background: #111; border: 1px solid #222; transition: 0.3s; }
        .btn-main:hover { border-color: #444; background: #181818; transform: translateY(-2px); }
        .input-ch { background: #000; border: 1px solid #222; border-radius: 8px; padding: 12px; width: 100%; font-family: monospace; }
        canvas { image-rendering: pixelated; }
        .scan-frame { border: 2px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); transition: 0.3s; }
        .success-anim { transform: scale(0.9); opacity: 0.5; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-6">

    <main id="menu" class="flex-1 flex flex-col items-center justify-center space-y-8 animate-in fade-in duration-700">
        <div class="text-center">
            <h1 class="text-5xl font-black tracking-tighter uppercase mb-2">
                <span style="color:var(--r)">R</span><span style="color:var(--g)">G</span><span style="color:var(--b)">B</span> QR System
            </h1>
            <p class="text-zinc-500 uppercase text-xs tracking-widest">Генератор и сканер qRgb кодов</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-md">
            <button onclick="showPage('gen')" class="btn-main p-8 rounded-2xl flex flex-col items-center gap-3">
                <span class="text-3xl">⊕</span> <span class="font-bold">ГЕНЕРАЦИЯ</span>
            </button>
            <button onclick="showPage('scan')" class="btn-main p-8 rounded-2xl flex flex-col items-center gap-3">
                <span class="text-3xl">☌</span> <span class="font-bold">СКАНИРОВАНИЕ</span>
            </button>
        </div>

        <div class="max-w-xl text-center pt-10 border-t border-zinc-900">
            <p class="text-[10px] text-zinc-600 leading-relaxed uppercase tracking-wider">
                Технология спектрального кодирования на базе SCI Universal Model. <br>
                Разработка: Astra314. Элемент интерактивного искусства.
            </p>
        </div>
    </main>

    <section id="page-gen" class="hidden max-w-2xl mx-auto w-full space-y-6">
        <button onclick="goBack()" class="text-xs text-zinc-500 hover:text-white">← НАЗАД</button>
        <div class="grid gap-4">
            <input id="in-r" class="input-ch" style="color:var(--r)" placeholder="RED CHANNEL DATA">
            <input id="in-g" class="input-ch" style="color:var(--g)" placeholder="GREEN CHANNEL DATA">
            <input id="in-b" class="input-ch" style="color:var(--b)" placeholder="BLUE CHANNEL DATA">
        </div>
        <button onclick="generate()" class="w-full bg-white text-black font-bold py-4 rounded-xl">СОЗДАТЬ КОД</button>
        <div class="flex flex-col items-center gap-4">
            <canvas id="qr-canvas" class="hidden rounded-lg shadow-2xl w-full max-w-[300px]"></canvas>
            <button id="btn-dl" class="hidden text-xs border border-zinc-800 px-4 py-2 rounded-full">СКАЧАТЬ PNG</button>
        </div>
    </section>

    <section id="page-scan" class="hidden max-w-2xl mx-auto w-full space-y-6">
        <button onclick="goBack()" class="text-xs text-zinc-500 hover:text-white">← НАЗАД</button>
        
        <div class="relative aspect-square bg-zinc-950 rounded-2xl overflow-hidden flex items-center justify-center">
            <video id="video" class="absolute inset-0 w-full h-full object-cover grayscale opacity-40" playsinline></video>
            <img id="upload-preview" class="absolute inset-0 w-full h-full object-contain hidden">
            <div id="scanner-ui" class="relative w-64 h-64 scan-frame rounded-3xl pointer-events-none"></div>
            
            <div class="absolute bottom-4 flex gap-2">
                <button id="btn-cam" class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-[10px] font-bold">КАМЕРА</button>
                <button onclick="document.getElementById('file-in').click()" class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-[10px] font-bold">ФАЙЛ</button>
                <input type="file" id="file-in" class="hidden" accept="image/*">
            </div>
        </div>

        <div class="grid gap-2">
            <div id="res-r" class="p-3 rounded bg-zinc-900/50 text-xs font-mono" style="color:var(--r)">RED: ---</div>
            <div id="res-g" class="p-3 rounded bg-zinc-900/50 text-xs font-mono" style="color:var(--g)">GREEN: ---</div>
            <div id="res-b" class="p-3 rounded bg-zinc-900/50 text-xs font-mono" style="color:var(--b)">BLUE: ---</div>
        </div>
    </section>

    <canvas id="temp-canvas" class="hidden"></canvas>
    <audio id="shutter-sound" src="https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3"></audio>

<script>
    let stream = null;
    const shutter = document.getElementById('shutter-sound');

    function showPage(id) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('page-' + id).classList.remove('hidden');
    }

    function goBack() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('menu').classList.remove('hidden');
    }

    // ГЕНЕРАТОР (Версия с синхронизацией)
    function generate() {
        const data = [document.getElementById('in-r').value || ' ', document.getElementById('in-g').value || ' ', document.getElementById('in-b').value || ' '];
        let maxVer = 1;
        data.forEach(t => { try { const q=qrcode(0,'M'); q.addData(t); q.make(); maxVer=Math.max(maxVer, (q.getModuleCount()-17)/4); } catch(e){} });
        const qrs = data.map(t => { const q=qrcode(maxVer,'M'); q.addData(t); q.make(); return q; });
        
        const canvas = document.getElementById('qr-canvas');
        const count = qrs[0].getModuleCount(), size = 10, margin = 2, total = (count + margin*2)*size;
        canvas.width = canvas.height = total;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,total,total);

        for(let y=0; y<count; y++) {
            for(let x=0; x<count; x++) {
                const colors = qrs.map(q => q.isDark(y,x)?255:0);
                if(colors.some(c=>c)) {
                    ctx.fillStyle = `rgb(${colors[0]},${colors[1]},${colors[2]})`;
                    ctx.fillRect((x+margin)*size, (y+margin)*size, size, size);
                }
            }
        }
        canvas.classList.remove('hidden'); document.getElementById('btn-dl').classList.remove('hidden');
    }

    // ДЕКОДЕР
    async function process(source) {
        const canvas = document.getElementById('temp-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = source.videoWidth || source.width;
        canvas.height = source.videoHeight || source.height;
        ctx.drawImage(source, 0, 0);
        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        
        const channels = ['res-r', 'res-g', 'res-b'];
        let foundAny = false;

        for(let c=0; c<3; c++) {
            const buf = new Uint8ClampedArray(imgData.data.length);
            for(let i=0; i<imgData.data.length; i+=4) {
                buf[i]=buf[i+1]=buf[i+2]=imgData.data[i+c]; buf[i+3]=255;
            }
            const code = jsQR(buf, canvas.width, canvas.height, { inversionAttempts: "attemptBoth" });
            if(code) {
                document.getElementById(channels[c]).innerText = ['RED','GREEN','BLUE'][c] + ": " + code.data;
                foundAny = true;
            }
        }

        if(foundAny) {
            shutter.play();
            document.getElementById('scanner-ui').classList.add('success-anim', 'border-green-500');
            setTimeout(() => document.getElementById('scanner-ui').classList.remove('success-anim', 'border-green-500'), 500);
        }
    }

    // КАМЕРА
    document.getElementById('btn-cam').onclick = async () => {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        const v = document.getElementById('video');
        v.srcObject = stream; v.play(); v.classList.remove('hidden');
        const loop = () => { if(stream) { process(v); requestAnimationFrame(loop); } };
        loop();
    };

    // ФАЙЛ
    document.getElementById('file-in').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const preview = document.getElementById('upload-preview');
                preview.src = img.src; preview.classList.remove('hidden');
                process(img);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
