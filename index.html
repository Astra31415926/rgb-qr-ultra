<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>RGB QR Ultra v4.0</title>
    
    <!-- SEO & Meta -->
    <meta name="description" content="Генератор та сканер спектральних QR-кодів з підтримкою RGB-каналів.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='35' height='35' rx='5' fill='%23ff004d'/><rect x='55' y='10' width='35' height='35' rx='5' fill='%2300ff41'/><rect x='32' y='55' width='35' height='35' rx='5' fill='%230088ff'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#000000',
                        surface: '#0a0a0a',
                        card: '#111111',
                        accent: {
                            red: '#ff004d',
                            green: '#00ff41',
                            blue: '#0088ff'
                        }
                    },
                    fontFamily: {
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* Base & Scrollbar */
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }

        /* Animations */
        @keyframes scanLine {
            0% { top: 0%; opacity: 0.8; }
            100% { top: 100%; opacity: 0.1; }
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
            40% { transform: translate(-2px, -2px); filter: hue-rotate(180deg); }
            60% { transform: translate(2px, 2px); filter: hue-rotate(270deg); }
            80% { transform: translate(2px, -2px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }
        
        .scan-line { 
            position: absolute; left: 0; right: 0; height: 2px; 
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            box-shadow: 0 0 15px #00ff41;
            animation: scanLine 2.5s linear forwards; 
            z-index: 20;
        }
        .glitch-effect { animation: glitch 0.6s cubic-bezier(.25, .46, .45, .94) both; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        .flash-effect { animation: flash 0.3s ease-out; }
        
        /* Inputs */
        textarea {
            resize: none; overflow-y: auto; font-size: 16px;
            min-height: 48px;
        }
        
        /* Canvas pixel perfect */
        canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
        
        /* Glow effects */
        .glow-red { box-shadow: 0 0 15px rgba(255, 0, 77, 0.6); }
        .glow-green { box-shadow: 0 0 15px rgba(0, 255, 65, 0.6); }
        .glow-blue { box-shadow: 0 0 15px rgba(0, 136, 255, 0.6); }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            .qr-preview { max-height: 300px; width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body">

    <!-- HEADER (Fixed) -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black/95 backdrop-blur-xl border-b border-white/10 h-16 flex items-center justify-between px-4">
        <!-- Live Mini QR -->
        <div class="w-16 h-16 p-1 bg-gray-900 rounded-xl border border-white/20 hidden" id="live-preview">
            <canvas id="live-mini-canvas" class="w-full h-full rounded-lg"></canvas>
        </div>
        
        <!-- Title -->
        <div class="text-center flex-1">
            <h1 class="font-heading font-bold text-xl tracking-tight text-white drop-shadow-lg">
                RGB QR ULTRA <span class="text-accent-green text-sm font-normal">v4.0</span>
            </h1>
        </div>
        
        <!-- Menu -->
        <button onclick="openModal('menu')" class="p-2 rounded-xl hover:bg-white/10 transition-all">
            <svg class="w-6 h-6 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 pt-20 pb-28 px-4">
        
        <!-- GENERATION TAB (Active by default) -->
        <section id="tab-generation" class="tab-content flex flex-col h-full">
            
            <!-- INPUTS (Top priority - always visible) -->
            <div class="space-y-4 mb-8 pt-4">
                <div class="relative group">
                    <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-accent-red to-pink-500 rounded-full glow-red"></div>
                    <textarea id="input-r" class="w-full bg-surface/50 border border-white/20 rounded-2xl p-4 pl-8 text-white placeholder-white/40 focus:outline-none focus:border-accent-red focus:ring-2 focus:ring-accent-red/30 transition-all duration-300 min-h-[56px]" rows="1" placeholder="🔴 Red Channel Data..."></textarea>
                </div>
                <div class="relative group">
                    <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-accent-green to-emerald-500 rounded-full glow-green"></div>
                    <textarea id="input-g" class="w-full bg-surface/50 border border-white/20 rounded-2xl p-4 pl-8 text-white placeholder-white/40 focus:outline-none focus:border-accent-green focus:ring-2 focus:ring-accent-green/30 transition-all duration-300 min-h-[56px]" rows="1" placeholder="🟢 Green Channel Data..."></textarea>
                </div>
                <div class="relative group">
                    <div class="absolute left-0 top-0 bottom-0 w-2 bg-gradient-to-b from-accent-blue to-blue-500 rounded-full glow-blue"></div>
                    <textarea id="input-b" class="w-full bg-surface/50 border border-white/20 rounded-2xl p-4 pl-8 text-white placeholder-white/40 focus:outline-none focus:border-accent-blue focus:ring-2 focus:ring-accent-blue/30 transition-all duration-300 min-h-[56px]" rows="1" placeholder="🔵 Blue Channel Data..."></textarea>
                </div>
            </div>

            <!-- QR PREVIEW -->
            <div class="flex-1 flex flex-col items-center justify-center mb-8">
                <div id="qr-container" class="relative qr-preview max-w-xs aspect-square bg-white/10 rounded-3xl border-4 border-white/20 backdrop-blur-xl shadow-2xl p-4 mx-auto">
                    <div id="qr-placeholder" class="absolute inset-0 flex items-center justify-center text-white/20 text-lg font-medium">
                        <div>Введіть текст для генерації</div>
                    </div>
                    <canvas id="qr-canvas" class="w-full h-full rounded-2xl opacity-0 transition-opacity duration-300"></canvas>
                </div>
                
                <!-- Status -->
                <div id="gen-status" class="mt-6 text-xs font-mono text-white/60 tracking-wider uppercase hidden">
                    <span id="total-bytes">0</span> байт ×3 канали
                </div>
            </div>

            <!-- ACTION BUTTON -->
            <button id="download-btn" onclick="downloadQR()" class="w-full py-5 bg-gradient-to-r from-accent-red via-accent-green to-accent-blue text-black font-bold rounded-3xl text-lg uppercase tracking-wider shadow-2xl hover:shadow-glow-xl active:scale-[0.98] transition-all duration-200 font-heading hidden">
                📱 Скачати PNG
            </button>
        </section>

        <!-- SCANNER TAB -->
        <section id="tab-scanner" class="tab-content hidden flex flex-col h-full">
            
            <!-- SCANNER VIEWPORT (45vh max) -->
            <div class="relative w-full max-w-md mx-auto aspect-square max-h-[45vh] bg-surface rounded-3xl border-4 border-white/20 overflow-hidden mb-6 shadow-2xl">
                
                <!-- Video/Image -->
                <video id="video-stream" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline muted></video>
                <canvas id="scan-canvas" class="absolute inset-0 w-full h-full object-contain hidden"></canvas>
                
                <!-- Scan Overlay -->

                        <div class="w-20 h-20 bg-gradient-to-br from-accent-green to-emerald-500 rounded-3xl flex items-center justify-center mb-4 glow-green">
                            <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                <circle cx="12" cy="13" r="2" stroke="currentColor" stroke-width="2" fill="currentColor"></circle>
                            </svg>
                        </div>
                        <div class="space-y-4">
                            <button onclick="startCamera()" class="w-24 h-12 bg-gradient-to-r from-accent-green to-emerald-500 rounded-2xl text-black font-bold text-sm uppercase tracking-wider glow-green hover:scale-105 active:scale-95 transition-all">
                                📷 Камера
                            </button>
                            <button onclick="document.getElementById('file-input').click()" class="w-24 h-12 bg-gradient-to-r from-accent-blue to-blue-500 rounded-2xl text-black font-bold text-sm uppercase tracking-wider glow-blue hover:scale-105 active:scale-95 transition-all">
                                📁 Файл
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RESULTS (Always visible, scrollable) -->
            <div class="flex-1 space-y-4 overflow-y-auto pb-4 -mb-4">
                <div id="res-r-box" class="result-box border-l-4 border-accent-red glow-red/50">
                    <div class="text-xs font-bold uppercase tracking-wider text-accent-red mb-1">RED CHANNEL</div>
                    <div id="res-r" class="text-base font-mono break-words min-h-[80px] py-4">Очікування сигналу...</div>
                </div>
                <div id="res-g-box" class="result-box border-l-4 border-accent-green glow-green/50">
                    <div class="text-xs font-bold uppercase tracking-wider text-accent-green mb-1">GREEN CHANNEL</div>
                    <div id="res-g" class="text-base font-mono break-words min-h-[80px] py-4">Очікування сигналу...</div>
                </div>
                <div id="res-b-box" class="result-box border-l-4 border-accent-blue glow-blue/50">
                    <div class="text-xs font-bold uppercase tracking-wider text-accent-blue mb-1">BLUE CHANNEL</div>
                    <div id="res-b" class="text-base font-mono break-words min-h-[80px] py-4">Очікування сигналу...</div>
                </div>
            </div>
            
            <div id="scan-status" class="text-center text-xs text-white/40 font-medium mt-2 hidden"></div>
        </section>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/95 backdrop-blur-xl border-t border-white/10 h-20 flex items-center justify-around px-4">
        <button onclick="switchTab('generation')" class="nav-btn active">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
            </svg>
            <span class="text-xs font-bold uppercase tracking-wider text-white">Створити</span>
        </button>
        <div class="w-12"></div>
        <button onclick="switchTab('scanner')" class="nav-btn">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-4.064 7-8.542 7-4.477 0-7.268-2.943-8.542-7z"></path>

    <!-- MODAL -->

        <div id="modal-content" class="bg-surface/90 w-full max-w-md max-h-[85vh] rounded-3xl border border-white/20 overflow-hidden backdrop-blur-xl shadow-2xl scale-95 transition-all duration-300">
            <div class="flex items-center justify-between p-6 border-b border-white/10">
                <h2 id="modal-title" class="font-heading font-bold text-2xl text-white"></h2>
                <button onclick="closeModal()" class="text-white/50 hover:text-white text-2xl font-bold p-1 rounded-lg hover:bg-white/10 transition">&times;</button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto max-h-96 text-white/90 text-sm leading-relaxed space-y-4 scrollbar-thin scrollbar-thumb-gray-600 scrollbar-track-transparent"></div>
        </div>
    </div>

    <!-- File Input -->
    <input type="file" id="file-input" class="hidden" accept="image/*">

    <script>
        // ========================================
        // STATE & ELEMENTS
        // ========================================
        const state = {
            currentTab: 'generation',
            stream: null,
            scanning: false,
            scanLoop: null,
            qrs: null // Store generated QRs globally
        };

        const $ = selector => document.getElementById(selector);
        const els = {
            inputs: ['input-r', 'input-g', 'input-b'].map(id => $(id)),
            tabs: { generation: $('tab-generation'), scanner: $('tab-scanner') },
            canvas: { main: $('qr-canvas'), mini: $('live-mini-canvas'), scan: $('scan-canvas') },
            results: { r: $('res-r'), g: $('res-g'), b: $('res-b') }
        };

        // ========================================
        // CONTENT DATABASE
        // ========================================
        const contentDB = {
            menu: { title: '📱 Меню', body: `
                <div class="space-y-3">
                    <button onclick="openModal('howto'); closeModal();" 
                            class="w-full flex items-center gap-3 p-4 bg-card/50 rounded-2xl hover:bg-white/10 transition-all text-left">
                        <div class="w-10 h-10 bg-gradient-to-r from-accent-green to-emerald-400 rounded-xl flex items-center justify-center glow-green">
                            ❓
                        </div>
                        <div>Як користуватися</div>
                    </button>
                    <button onclick="openModal('tech'); closeModal();" 
                            class="w-full flex items-center gap-3 p-4 bg-card/50 rounded-2xl hover:bg-white/10 transition-all text-left">
                        <div class="w-10 h-10 bg-gradient-to-r from-accent-blue to-blue-400 rounded-xl flex items-center justify-center glow-blue">
                            ⚗️
                        </div>
                        <div>Технологія</div>
                    </button>
                    <button onclick="openModal('author'); closeModal();" 
                            class="w-full flex items-center gap-3 p-4 bg-card/50 rounded-2xl hover:bg-white/10 transition-all text-left">
                        <div class="w-10 h-10 bg-gradient-to-r from-accent-red to-pink-400 rounded-xl flex items-center justify-center glow-red">
                            👨‍🎨
                        </div>
                        <div>Автор</div>
                    </button>
                </div>
            `},
            howto: { title: '📖 Як користуватися', body: `
                <p><strong>Генерація:</strong></p>
                <p class="ml-4 text-sm text-white/80">1. Введіть текст у поля R/G/B<br>2. QR генерується автоматично<br>3. Натисніть "Скачати PNG"</p>
                
                <p class="mt-6"><strong>Сканування:</strong></p>
                <p class="ml-4 text-sm text-white/80">1. Камера → покаже статичний кадр + 3 канали<br>2. Файл → скануюча лінія → результати</p>
                
                <p class="mt-8 p-4 bg-accent-green/10 border border-accent-green/20 rounded-2xl text-xs text-accent-green font-medium text-center">
                    ✅ Стабільно працює з екрану. Друк потребує SCI-корекції (посилання в "Автор").
                </p>
            `},
            tech: { title: '⚗️ Технологія', body: `
                <p><strong>RGB Spectral Encoding</strong> — кодування даних у 3 незалежні канали для ×3 ємності.</p>
                
                <div class="grid grid-cols-2 gap-4 mt-6 text-xs">
                    <div class="space-y-2 p-3 bg-card/50 rounded-xl">
                        <div class="font-bold text-accent-red">Плюси:</div>
                        <div>• ×3 дані в одному QR</div>
                        <div>• Швидке сканування</div>
                        <div>• Стабільно на екранах</div>
                    </div>
                    <div class="space-y-2 p-3 bg-card/50 rounded-xl">
                        <div class="font-bold text-accent-red">Мінуси:</div>
                        <div>• CMYK шум при друці</div>
                        <div>• Потребує корекції</div>
                    </div>
                </div>
                
                <p class="mt-6 text-xs text-white/60 italic">
                    Масахіро Хара, Denso Wave, 1994 → HCC2D → SCI Encoding
                </p>
            `},
            author: { title: '👨‍🎨 Михайло Кашкаров', body: `
                <p class="text-lg font-bold text-white mb-2">Science-Art Researcher</p>
                <p class="text-white/80 mb-8">Світлочутливий живопис • Спектральний дизайн • SCI Encoding</p>
                
                <div class="space-y-4 text-sm">
                    <a href="https://zenodo.org/records/18895764" target="_blank" 
                       class="block p-4 bg-gradient-to-r from-accent-blue to-blue-500 rounded-2xl hover:scale-105 transition-all glow-blue">
                        📚 SCI Universal Model (Zenodo)
                    </a>
                    <a href="mailto:bakminsterfuler@gmail.com" 
                       class="block p-4 bg-gradient-to-r from-accent-green to-emerald-500 rounded-2xl hover:scale-105 transition-all glow-green">
                        ✉️ bakminsterfuler@gmail.com
                    </a>
                    <a href="https://astra31415926.github.io/" target="_blank" 
                       class="block p-4 bg-gradient-to-r from-accent-red to-pink-500 rounded-2xl hover:scale-105 transition-all glow-red">
                        🌐 astra31415926.github.io
                    </a>
                </div>
            `}
        };

        // ========================================
        // CORE FUNCTIONS
        // ========================================

        // 🔧 UTF-8 QR Encoding/Decoding (Кирилиця!)
        function encodeQRData(text) {
            const encoder = new TextEncoder('utf-8');
            const bytes = encoder.encode(text);
            const qr = qrcode(0, 'M');
            qr.addData(bytes, qrcodegen.QRCode.Ecc.MEDIUM, qrcodegen.QRCode.Mode.BYTE);
            qr.make();
            return qr;
        }

        function decodeQRData(rawData) {
            if (!rawData) return null;
            try {
                const decoder = new TextDecoder('utf-8');
                return decoder.decode(new Uint8Array(rawData));
            } catch {
                return rawData;
            }
        }

        // 🎵 Shutter Sound (Web Audio API)
        function playShutterSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.15);
        }

        // ========================================
        // NAVIGATION
        // ========================================
        function switchTab(tabName) {
            // Hide all tabs
            Object.values(els.tabs).forEach(tab => tab.classList.add('hidden'));
            els.tabs[tabName].classList.remove('hidden');
            
            // Update nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-white', 'glow-green');
                btn.classList.add('text-white/40');
            });
            event?.target.classList.add('text-white', 'glow-green');
            
            state.currentTab = tabName;
            
            // Reset scanner
            if (tabName === 'scanner' && state.stream) stopCamera();
        }

        // ========================================
        // MODALS
        // ========================================
        function openModal(id) {
            const data = contentDB[id];
            $('modal-title').textContent = data.title;
            $('modal-body').innerHTML = data.body;
            
            $('modal-overlay').classList.remove('hidden', 'opacity-0');
            $('modal-content').classList.remove('scale-95');
        }

        function closeModal(event) {
            if (event?.target.id !== 'modal-overlay') return;
            $('modal-overlay').classList.add('opacity-0');
            $('modal-content').classList.add('scale-95');
            setTimeout(() => $('modal-overlay').classList.add('hidden'), 300);
        }

        // ========================================
        // GENERATION LOGIC
        // ========================================
        els.inputs.forEach(input => {
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
                generateQR();
            });
        });

        function generateQR() {
            const texts = els.inputs.map(input => input.value.trim() || ' ');
            const totalBytes = texts.reduce((sum, text) => sum + new Blob([text]).size, 0);
            
            // Update status
            $('total-bytes').textContent = totalBytes;
            $('gen-status').classList.toggle('hidden', totalBytes === 0);
            $('download-btn').classList.toggle('hidden', totalBytes === 0);
            $('live-preview').classList.toggle('hidden', totalBytes === 0);
            
            if (totalBytes === 0) {
                $('qr-canvas').style.opacity = '0';
                $('qr-placeholder').classList.remove('hidden');
                return;
            }
            
            $('qr-placeholder').classList.add('hidden');
            $('qr-canvas').style.opacity = '1';

            // Find max version & generate synchronized QRs
            let maxVersion = 0;
            texts.forEach(text => {
                try {
                    const qr = encodeQRData(text);
                    const version = Math.floor((qr.getModuleCount() - 17) / 4);
                    maxVersion = Math.max(maxVersion, version);
                } catch {}
            });

            state.qrs = texts.map(text => encodeQRData(text));

            // Render both canvases
            renderQR(state.qrs, els.canvas.main, 300);
            renderQR(state.qrs, els.canvas.mini, 56);
        }

        function renderQR(qrs, canvas, size = 300) {
            const modCount = qrs[0]?.getModuleCount() || 21;
            const modSize = size / modCount;
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;
            
            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            
            // RGB modules
            for (let y = 0; y < modCount; y++) {
                for (let x = 0; x < modCount; x++) {
                    const r = qrs[0]?.isDark(y, x) ? 255 : 0;
                    const g = qrs[1]?.isDark(y, x) ? 255 : 0;
                    const b = qrs[2]?.isDark(y, x) ? 255 : 0;
                    
                    if (r + g + b > 0) {
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                        ctx.fillRect(x * modSize, y * modSize, modSize, modSize);
                    }
                }
            }
        }

        function downloadQR() {
            if (!state.qrs) return;
            
            playShutterSound();
            const link = document.createElement('a');
            link.download = `RGB-QR-Ultra-${Date.now()}.png`;
            link.href = els.canvas.main.toDataURL('image/png', 1.0);
            link.click();
        }

        // ========================================
        // SCANNER LOGIC
        // ========================================
        $('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => processImage(evt.target.result);
                reader.readAsDataURL(file);
            }
        });

        function processImage(src) {
            const img = new Image();
            img.onload = () => {
                // Show image
                const canvas = els.canvas.scan;
                const ctx = canvas.getContext('2d');
                const container = canvas.parentElement;
                
                const scale = Math.min(container.clientWidth / img.width, container.clientHeight / img.height, 1);
                const w = img.width * scale;
                const h = img.height * scale;
                
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = `${w}px`;
                canvas.style.height = `${h}px`;
                canvas.style.margin = 'auto';
                canvas.style.top = `${(container.clientHeight - h) / 2}px`;
                
                ctx.drawImage(img, 0, 0, w, h);
                
                // UI transition
                $('scan-controls').classList.add('hidden');
                canvas.classList.remove('hidden');
                $('scan-frame').classList.remove('hidden');
                
                // Scan animation
                startScanAnimation(() => {
                    const imageData = ctx.getImageData(0, 0, w, h);
                    decodeImage(imageData);
                    
                    // Fade out image
                    canvas.style.transition = 'opacity 0.5s';
                    canvas.style.opacity = '0';
                    setTimeout(() => {
                        canvas.classList.add('hidden');
                        canvas.style.opacity = '1';
                        $('scan-controls').classList.remove('hidden');
                    }, 500);
                });
            };
            img.src = src;
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1280 } } 
            }).then(stream => {
                state.stream = stream;
                const video = $('video-stream');
                video.srcObject = stream;
                video.play();
                
                $('scan-controls').classList.add('hidden');
                video.classList.remove('hidden');
                $('scan-frame').classList.remove('hidden');
                
                state.scanning = true;
                state.scanLoop = requestAnimationFrame(scanLoop);
            }).catch(err => {
                $('scan-status').textContent = '❌ Доступ до камери заблоковано';
                $('scan-status').classList.remove('hidden');
            });
        }

        function stopCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(track => track.stop());
                state.stream = null;
            }
            state.scanning = false;
            if (state.scanLoop) cancelAnimationFrame(state.scanLoop);
            
            $('video-stream').classList.add('hidden');
            $('scan-frame').classList.add('hidden');
            $('scan-controls').classList.remove('hidden');
            $('scan-status').classList.add('hidden');
        }

        function scanLoop() {
            if (!state.scanning) return;
            
            const video = $('video-stream');
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = els.canvas.scan;
                const ctx = canvas.getContext('2d');
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                if (decodeImage(ctx.getImageData(0, 0, canvas.width, canvas.height), true)) {
                    // SUCCESS
                    playShutterSound();
                    triggerFlash();
                    state.scanning = false;
                    setTimeout(stopCamera, 2000);
                    return;
                }
            }
            state.scanLoop = requestAnimationFrame(scanLoop);
        }

        function decodeImage(imageData, isLive = false) {
            const { width: w, height: h, data } = imageData;
            
            // Extract RGB channels
            const channels = [[], [], []];
            for (let i = 0; i < data.length; i += 4) {
                channels[0][i >> 2] = data[i];     // R
                channels[1][i >> 2] = data[i + 1]; // G  
                channels[2][i >> 2] = data[i + 2]; // B
            }
            
            // Decode each channel
            const results = channels.map((channel, idx) => {
                const chData = new Uint8ClampedArray(w * h * 4);
                for (let i = 0; i < w * h; i++) {
                    const base = i * 4;
                    chData[base] = chData[base + 1] = chData[base + 2] = channel[i];
                    chData[base + 3] = 255;
                }
                const qr = jsQR(chData, w, h);
                return qr ? decodeQRData(qr.data) : null;
            });
            
            const hasResults = results.some(r => r);
            
            // Update UI
            updateResult('res-r', results[0]);
            updateResult('res-g', results[1]);
            updateResult('res-b', results[2]);
            
            if (!hasResults && !isLive) {
                $('scan-status').textContent = '❌ QR не розпізнано. Спробуйте ще раз.';
                $('scan-status').classList.remove('hidden');
            }
            
            return hasResults;
        }

        function startScanAnimation(callback) {
            const line = $('scan-line');
            line.classList.remove('hidden');
            
            setTimeout(() => {
                line.classList.add('hidden');
                callback();
            }, 2500);
        }

        function triggerFlash() {
            const flash = $('flash-overlay');
            flash.classList.add('flash-effect');
            setTimeout(() => flash.classList.remove('flash-effect'), 300);
        }

        function updateResult(id, data) {
            const el = els.results[id.replace('res-', '')];
            const box = $(id + '-box');
            
            if (data) {
                el.textContent = data;
                box.classList.add('fade-in', 'glow-green/75');
                box.style.cursor = 'pointer';
                
                // Copy on click
                box.onclick = () => {
                    navigator.clipboard.writeText(data).then(() => {
                        const original = el.textContent;
                        el.textContent = '✅ Скопійовано!';
                        setTimeout(() => el.textContent = original, 1500);
                    });
                };
            }
        }

        // ========================================
        // INIT
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            switchTab('generation');
        });

        // Prevent zoom on iOS
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) event.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
