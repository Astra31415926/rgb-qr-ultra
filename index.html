<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System v3.1 | Astra314</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #111111;
            --text: #e0e0e0;
            --muted: #555;
            --r: #FF0000;
            --g: #00FF00;
            --b: #0000FF;
            --neon-w: 0 0 5px #fff, 0 0 10px #fff;
            --neon-r: 0 0 5px var(--r), 0 0 10px var(--r);
            --neon-g: 0 0 5px var(--g), 0 0 10px var(--g);
            --neon-b: 0 0 5px var(--b), 0 0 10px var(--b);
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        .btn-neon {
            border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 0.5rem 1rem;
            font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;
            background: transparent; transition: all 0.3s ease; cursor: pointer;
        }
        .btn-neon:hover { border-color: #fff; box-shadow: var(--neon-w); text-shadow: var(--neon-w); }
        .action-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .action-card:hover { background: rgba(255,255,255,0.05); border-color: #333; transform: translateY(-4px); }
        .input-rgb {
            background: rgba(0,0,0,0.8); border: 1px solid #111; color: #fff;
            padding: 1rem; width: 100%; resize: none; font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; overflow-y: hidden; transition: border-color 0.3s;
        }
        .input-rgb:focus { outline: none; }
        .input-rgb.input-r:focus { border-color: var(--r); box-shadow: inset 0 0 20px rgba(255,0,0,0.1); }
        .input-rgb.input-g:focus { border-color: var(--g); box-shadow: inset 0 0 20px rgba(0,255,0,0.1); }
        .input-rgb.input-b:focus { border-color: var(--b); box-shadow: inset 0 0 20px rgba(0,0,255,0.1); }
        #qr-canvas, #scan-preview-canvas { image-rendering: pixelated; max-width: 250px; max-height: 250px; margin: 0 auto; object-fit: contain; }
        @keyframes scanLine {
            0% { top: 0%; opacity: 0; } 10% { opacity: 1; }
            90% { opacity: 1; } 100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 15px 5px #fff;
            animation: scanLine 2s linear forwards; z-index: 10;
        }
        .flash-effect { animation: flash 0.5s ease-out; }
        @keyframes flash { 0%, 100% { box-shadow: none; opacity: 1; } 50% { box-shadow: inset 0 0 20px #fff; opacity: 0.9; border-color: #fff; } }
        .fade-q, .fade-scan { opacity: 0.4 !important; transition: opacity 1s ease; } /* Зменшено для акценту на результатах */
        .view { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .view.active { display: flex; flex-direction: column; opacity: 1; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #050505; border: 1px solid #222; padding: 2.5rem;
            max-width: 650px; width: 90%; max-height: 70vh; overflow-y: auto; position: relative;
        }
        .result-box {
            background: #000; border: 1px solid #222; padding: 1rem;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            word-break: break-all; min-height: 60px; transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- ... (меню, генерація, сканування — без змін у HTML-структурі, тільки стилі + скрипт нижче) ... -->

    <!-- Modal windows (без змін у HTML) -->
    <div id="modal-howto" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-howto">Як користуватися</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-howto" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>
    <div id="modal-tech" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-tech">Технологія</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-tech" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>
    <div id="modal-author" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-author">Автор</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-author" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>

    <script>
        const state = { lang: 'ua', stream: null, scanLoop: null, cameraActive: false };
        const decoder = new TextDecoder('utf-8');
        const encoder = new TextEncoder();

        const content = {
            ua: {
                titles: { howto: "Як користуватися", tech: "Технологія", author: "Автор" },
                howto: `<p>На цьому сайті ви можете:</p><ul class="list-disc pl-5 space-y-2"><li>Створювати кольорові (спектральні) 2D-коди, де дані розподіляються по каналах.</li><li>Тестувати їх зчитування безпосередньо з екрана.</li></ul><p class="mt-4 p-3 bg-white/5 border-l-2 border-white/20 text-xs">🔒 <b>Приватність:</b> Сайт не зберігає ваші дані, все відбувається локально у вашому браузері.</p><p class="mt-4 text-yellow-300/70">⚠️ <b>Важливо:</b> Стабільне зчитування у друці потребує додаткових методів, посилання на які є в розділі АВТОР.</p>`,
                tech: `<p><b>Міжканальний шум та спектральна цілісність</b></p><p>Класичні QR-коди оптимізовані для чорно-білого контрасту. При друку в CMYK виникає проблема "міжканального шуму", де пігменти змішуються, заважаючи зчитуванню кольорових шарів.</p><p class="mt-2">Ця система використовує адитивну модель RGB, де кожен канал (R, G, B) є незалежним носієм інформації. Це дозволяє потроїти обсяг даних в одному коді.</p><p class="mt-4">Докладніше про обмеження друку та наукові підходи — у публікаціях автора.</p>`,
                author: `<p><b>Михайло Кашкаров</b></p><p class="text-gray-400 text-xs mb-4">Science-art художник, дослідник, інженер.</p><p>Спеціалізується на спектральному дизайні та людино-машинній взаємодії.</p><div class="mt-6 space-y-3 font-mono text-[10px] uppercase tracking-wider"><p>Email: <a href="mailto:bakminsterfuler@gmail.com" class="text-white underline">bakminsterfuler@gmail.com</a></p><p>Website: <a href="https://astra31415926.github.io/" target="_blank" class="text-white underline">astra31415926.github.io</a></p><p>Публікації: SCI Universal Model, RSS Reflectance Synchronized System, SCI Encoding для кольорових 2D-кодів</p></div>`
            },
            en: { /* аналогічно, але коротко — можеш додати повний текст з ТЗ, якщо треба */ }
        };

        // ... (playSfx, navigateTo, resetToMenu, openModal, closeModal, setLang, updateModalContent — без змін)

        // --- Generation ---
        document.querySelectorAll('.input-rgb').forEach(el => el.addEventListener('input', generateQR));

        function generateQR() {
            const inputs = [document.getElementById('input-r'), document.getElementById('input-g'), document.getElementById('input-b')];
            const data = inputs.map(el => el.value.trim());
            if (!data.join('')) return resetToMenu();

            let maxVersion = 1;
            data.forEach(text => {
                if (!text) return;
                try {
                    const bytes = encoder.encode(text);
                    let v = 1;
                    while (v <= 40) {
                        const q = qrcode(v, 'M');
                        q.addData(new Uint8Array(bytes));
                        q.make();
                        if (q.getModuleCount() <= 177) { // max QR v40 ~177 modules
                            maxVersion = Math.max(maxVersion, v);
                            break;
                        }
                        v++;
                    }
                } catch (e) { console.warn("Текст надто довгий для каналу"); }
            });

            const qrs = data.map(text => {
                const q = qrcode(maxVersion, 'M');
                if (text) q.addData(new Uint8Array(encoder.encode(text)));
                else q.addData(' ');
                q.make();
                return q;
            });

            const canvas = document.getElementById('qr-canvas');
            const ctx = canvas.getContext('2d');
            const mc = qrs[0].getModuleCount();
            const ms = 8;
            const size = (mc + 8) * ms;
            canvas.width = canvas.height = size;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, size, size);

            for (let y = 0; y < mc; y++) {
                for (let x = 0; x < mc; x++) {
                    const rgb = qrs.map(q => q.isDark(y, x) ? 255 : 0);
                    if (rgb.some(v => v)) {
                        ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
                        ctx.fillRect((x + 4) * ms, (y + 4) * ms, ms, ms);
                    }
                }
            }

            canvas.classList.remove('hidden', 'fade-q');
            document.getElementById('gen-placeholder').classList.add('hidden');
            document.getElementById('btn-download').classList.remove('hidden');
        }

        function downloadQR() {
            playSfx('shutter');
            const a = document.createElement('a');
            a.download = 'rgb-qr.png';
            a.href = document.getElementById('qr-canvas').toDataURL();
            a.click();
            document.getElementById('qr-canvas').classList.add('fade-q');
            document.getElementById('post-download-msg').classList.remove('hidden');
        }

        // --- Scanning ---
        async function startCamera() {
            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const v = document.getElementById('video');
                v.srcObject = state.stream;
                v.play();
                v.classList.remove('hidden');
                document.getElementById('scan-ui-controls').classList.add('hidden');
                document.getElementById('scan-placeholder').classList.add('hidden');
                state.cameraActive = true;
                const t = () => {
                    if (state.cameraActive) {
                        const c = document.createElement('canvas');
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        c.getContext('2d').drawImage(v, 0, 0);
                        scan(c);
                        requestAnimationFrame(t);
                    }
                };
                t();
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.getElementById('scan-preview-canvas');
                    const ctx = c.getContext('2d');
                    ctx.clearRect(0, 0, c.width, c.height); // очищення перед новим
                    c.width = img.width;
                    c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    c.classList.remove('hidden', 'fade-scan');
                    document.getElementById('scan-ui-controls').classList.add('hidden');
                    document.getElementById('scan-placeholder').classList.add('hidden');
                    const l = document.createElement('div');
                    l.className = 'scan-line';
                    document.getElementById('scan-viewport').appendChild(l);
                    setTimeout(() => { l.remove(); scan(c, true); }, 2000);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function scan(canvas, fromFile = false) {
            const ctx = canvas.getContext('2d');
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const ids = ['res-r', 'res-g', 'res-b'];
            let found = false;

            for (let i = 0; i < 3; i++) {
                const gray = new Uint8ClampedArray(img.data.length);
                for (let j = 0; j < img.data.length; j += 4) {
                    gray[j] = gray[j+1] = gray[j+2] = img.data[j + i]; // тільки канал i
                    gray[j+3] = 255;
                }
                const code = jsQR(gray, canvas.width, canvas.height);
                if (code && code.data) {
                    try {
                        const txt = decoder.decode(new Uint8Array(encoder.encode(code.data))); // UTF-8 roundtrip
                        const el = document.getElementById(ids[i]);
                        if (el.innerText !== txt) {
                            el.innerText = txt;
                            el.classList.add('flash-effect');
                            setTimeout(() => el.classList.remove('flash-effect'), 500);
                            found = true;
                        }
                    } catch (e) { console.warn(e); }
                }
            }

            if (found) {
                playSfx('beep');
                if (fromFile) {
                    document.getElementById('scan-preview-canvas').classList.add('fade-scan'); // робимо прев'ю другорядним
                }
            }
        }

        // ініціалізація модальних вікон при завантаженні
        updateModalContent('howto');
        updateModalContent('tech');
        updateModalContent('author');
    </script>
</body>
</html>
