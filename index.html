<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System v3.1 | Astra314</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --border: #111; --text: #e0e0e0; --r: #FF0000; --g: #00FF00; --b: #0000FF; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        
        /* Корекція розміру фото */
        #scan-preview-canvas { 
            display: block;
            margin: 10px auto;
            max-width: 120px !important; /* Фіксований адекватний розмір */
            max-height: 120px !important;
            border: 1px solid #333;
            transition: all 0.5s ease;
        }
        .fade-scan { opacity: 0.5; filter: grayscale(1); }

        /* Модальне вікно з прокруткою */
        .modal-content {
            background: #050505; border: 1px solid #222; padding: 2rem;
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        
        .result-box {
            background: #080808; border: 1px solid #1a1a1a; padding: 12px;
            font-family: 'JetBrains Mono', monospace; min-height: 50px;
            color: #fff; margin-bottom: 8px; border-radius: 4px;
        }
        .input-rgb { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto space-y-8">
        
        <section id="gen-view" class="space-y-4">
            <h2 class="text-center text-xs tracking-widest uppercase opacity-50">Generator</h2>
            <textarea id="input-r" class="input-rgb" placeholder="Текст для Red (Кирилиця працює)"></textarea>
            <textarea id="input-g" class="input-rgb" placeholder="Текст для Green"></textarea>
            <textarea id="input-b" class="input-rgb" placeholder="Текст для Blue"></textarea>
            <canvas id="qr-canvas" class="mx-auto hidden"></canvas>
        </section>

        <hr class="border-zinc-900">

        <section id="scan-view" class="text-center">
            <h2 class="text-center text-xs tracking-widest uppercase opacity-50 mb-4">Scanner</h2>
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file-input').click()" class="border border-white/20 px-4 py-2 text-xs uppercase">Завантажити фото</button>
            
            <div id="scan-viewport" class="relative mt-4">
                <canvas id="scan-preview-canvas" class="hidden"></canvas>
            </div>

            <div class="mt-4 text-left space-y-2">
                <div id="res-r" class="result-box border-l-4 border-red-600 text-red-400">R: -</div>
                <div id="res-g" class="result-box border-l-4 border-green-600 text-green-400">G: -</div>
                <div id="res-b" class="result-box border-l-4 border-blue-600 text-blue-400">B: -</div>
            </div>
        </section>
    </div>

    <script>
        const encoder = new TextEncoder();
        const decoder = new TextDecoder('utf-8');

        // ГЕНЕРАЦІЯ
        document.querySelectorAll('.input-rgb').forEach(el => el.addEventListener('input', generateQR));

        function generateQR() {
            const data = [
                document.getElementById('input-r').value,
                document.getElementById('input-g').value,
                document.getElementById('input-b').value
            ];

            const qrs = data.map(text => {
                const q = qrcode(0, 'M');
                // Виправлення КИРИЛИЦІ: примусовий тип Byte + UTF-8 масив
                if (text) {
                    q.addData(Array.from(encoder.encode(text)), 'Byte');
                } else {
                    q.addData(' ');
                }
                q.make();
                return q;
            });

            const canvas = document.getElementById('qr-canvas');
            const ctx = canvas.getContext('2d');
            const mc = qrs[0].getModuleCount();
            const ms = 4;
            canvas.width = canvas.height = mc * ms;
            canvas.classList.remove('hidden');

            for (let y = 0; y < mc; y++) {
                for (let x = 0; x < mc; x++) {
                    const r = qrs[0].isDark(y, x) ? 255 : 0;
                    const g = qrs[1].isDark(y, x) ? 255 : 0;
                    const b = qrs[2].isDark(y, x) ? 255 : 0;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x * ms, y * ms, ms, ms);
                }
            }
        }

        // СКАНУВАННЯ
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.getElementById('scan-preview-canvas');
                    const ctx = c.getContext('2d');
                    // Скидання розмірів для внутрішніх розрахунків
                    c.width = img.width;
                    c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    c.classList.remove('hidden', 'fade-scan');
                    
                    // Затримка для імітації аналізу
                    setTimeout(() => scan(c), 500);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function scan(canvas) {
            const ctx = canvas.getContext('2d');
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const ids = ['res-r', 'res-g', 'res-b'];

            for (let i = 0; i < 3; i++) {
                const gray = new Uint8ClampedArray(imgData.data.length);
                for (let j = 0; j < imgData.data.length; j += 4) {
                    const val = imgData.data[j + i];
                    gray[j] = gray[j+1] = gray[j+2] = val;
                    gray[j+3] = 255;
                }
                const code = jsQR(gray, canvas.width, canvas.height);
                if (code) {
                    // Коректне відображення кирилиці при розшифруванні
                    document.getElementById(ids[i]).innerText = code.data;
                }
            }
            canvas.classList.add('fade-scan'); // Стискання та вицвітання після сканування
        }
    </script>
</body>
</html>
