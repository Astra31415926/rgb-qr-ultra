<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --r: #ff2a2a; --g: #2aff2a; --b: #2a9fff; }
        body { background: #000; color: #e0e0e0; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        
        /* Поля ввода */
        .input-wrapper { position: relative; margin-bottom: 1rem; }
        .input-ch { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px;
            padding: 14px; width: 100%; color: #fff; font-family: monospace;
            resize: none; overflow: hidden; transition: all 0.3s ease;
        }
        .input-ch:focus { outline: none; background: #0f0f0f; }
        .input-r:focus { border-color: var(--r); box-shadow: 0 0 10px rgba(255,42,42,0.2); }
        .input-g:focus { border-color: var(--g); box-shadow: 0 0 10px rgba(42,255,42,0.2); }
        .input-b:focus { border-color: var(--b); box-shadow: 0 0 10px rgba(42,159,255,0.2); }

        /* Анимация сканирования */
        .scanner-container { position: relative; overflow: hidden; border-radius: 20px; background: #0a0a0a; }
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, #fff, transparent);
            box-shadow: 0 0 15px #fff; z-index: 10; display: none;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .scanning .scan-line { display: block; animation: scan 2s linear infinite; }
        
        .qr-preview { transition: all 0.5s ease; max-width: 300px; width: 100%; height: auto; border-radius: 12px; }
        .qr-downloaded { opacity: 0.3; transform: scale(0.95); filter: blur(2px); }
        
        .btn-action { background: #fff; color: #000; font-weight: 800; padding: 16px; border-radius: 14px; transition: 0.3s; width: 100%; }
        .btn-action:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 md:p-8">

    <main id="menu" class="flex-1 flex flex-col items-center justify-center space-y-12">
        <div class="text-center">
            <h1 class="text-5xl font-black tracking-tighter uppercase mb-2">
                <span style="color:var(--r)">R</span><span style="color:var(--g)">G</span><span style="color:var(--b)">B</span> QR System
            </h1>
            <p class="text-zinc-600 uppercase text-[10px] tracking-[0.3em]">Spectral Encoding Interface</p>
        </div>

        <div class="grid grid-cols-1 gap-4 w-full max-w-xs">
            <button onclick="showPage('gen')" class="border border-zinc-800 p-6 rounded-2xl hover:bg-zinc-900 transition flex flex-col items-center gap-2">
                <span class="text-2xl">⊕</span> <span class="font-bold tracking-widest text-xs">ГЕНЕРАЦИЯ</span>
            </button>
            <button onclick="showPage('scan')" class="border border-zinc-800 p-6 rounded-2xl hover:bg-zinc-900 transition flex flex-col items-center gap-2">
                <span class="text-2xl">☌</span> <span class="font-bold tracking-widest text-xs">СКАНИРОВАНИЕ</span>
            </button>
        </div>

        <footer class="max-w-md text-center opacity-30">
            <p class="text-[9px] uppercase leading-relaxed tracking-widest">
                SCI Universal Model: Deterministic Spectral Response Normalization.<br>
                Astra314 Research Project © 2026.
            </p>
        </footer>
    </main>

    <section id="page-gen" class="hidden max-w-xl mx-auto w-full space-y-6">
        <button onclick="goBack()" class="text-[10px] tracking-widest text-zinc-500 hover:text-white transition">← ВЕРНУТЬСЯ</button>
        
        <div class="space-y-3">
            <textarea id="in-r" class="input-ch input-r" placeholder="RED CHANNEL..." rows="1" oninput="autoGrow(this); liveGen()"></textarea>
            <textarea id="in-g" class="input-ch input-g" placeholder="GREEN CHANNEL..." rows="1" oninput="autoGrow(this); liveGen()"></textarea>
            <textarea id="in-b" class="input-ch input-b" placeholder="BLUE CHANNEL..." rows="1" oninput="autoGrow(this); liveGen()"></textarea>
        </div>

        <div id="gen-result" class="hidden flex flex-col items-center gap-6 py-6 animate-in fade-in zoom-in duration-500">
            <canvas id="qr-canvas" class="qr-preview shadow-[0_0_50px_rgba(255,255,255,0.05)]"></canvas>
            <button id="btn-dl" onclick="downloadQR()" class="btn-action">СКАЧАТЬ PNG</button>
        </div>
    </section>

    <section id="page-scan" class="hidden max-w-xl mx-auto w-full space-y-6">
        <button onclick="goBack()" class="text-[10px] tracking-widest text-zinc-500 hover:text-white transition">← ВЕРНУТЬСЯ</button>
        
        <div id="scanner-box" class="scanner-container aspect-square">
            <div class="scan-line"></div>
            <video id="video" class="w-full h-full object-cover grayscale opacity-20" playsinline></video>
            <img id="upload-preview" class="absolute inset-0 w-full h-full object-contain hidden">
            
            <div id="scan-controls" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm gap-4 transition-all duration-500">
                <button onclick="startCamera()" class="p-4 bg-white/10 rounded-full hover:bg-white/20 transition">📷</button>
                <button onclick="document.getElementById('file-in').click()" class="p-4 bg-white/10 rounded-full hover:bg-white/20 transition">📁</button>
            </div>
            <input type="file" id="file-in" class="hidden" accept="image/*">
        </div>

        <div id="results" class="grid gap-2 animate-in slide-in-from-bottom-4 duration-500">
            <div id="res-r" class="p-4 rounded-xl bg-zinc-900/30 text-[11px] font-mono border-l-2 border-red-600/50 text-red-400">RED: ---</div>
            <div id="res-g" class="p-4 rounded-xl bg-zinc-900/30 text-[11px] font-mono border-l-2 border-green-600/50 text-green-400">GREEN: ---</div>
            <div id="res-b" class="p-4 rounded-xl bg-zinc-900/30 text-[11px] font-mono border-l-2 border-blue-600/50 text-blue-400">BLUE: ---</div>
        </div>
    </section>

    <audio id="shutter" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    let activeStream = null;
    const shutter = document.getElementById('shutter');

    function autoGrow(el) {
        el.style.height = "auto";
        el.style.height = (el.scrollHeight) + "px";
    }

    function showPage(id) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('page-' + id).classList.remove('hidden');
    }

    function goBack() {
        if(activeStream) activeStream.getTracks().forEach(t => t.stop());
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('menu').classList.remove('hidden');
        // Полная очистка
        document.querySelectorAll('textarea').forEach(t => { t.value = ''; t.style.height = 'auto'; });
        document.getElementById('gen-result').classList.add('hidden');
        document.getElementById('qr-canvas').classList.remove('qr-downloaded');
        document.getElementById('upload-preview').classList.add('hidden');
        document.getElementById('scan-controls').classList.remove('hidden');
        document.getElementById('scanner-box').classList.remove('scanning');
        ['res-r','res-g','res-b'].forEach(id => document.getElementById(id).innerText = id.split('-')[1].toUpperCase() + ": ---");
    }

    // LIVE ГЕНЕРАЦИЯ
    function liveGen() {
        const r = document.getElementById('in-r').value;
        const g = document.getElementById('in-g').value;
        const b = document.getElementById('in-b').value;

        if(!r && !g && !b) {
            document.getElementById('gen-result').classList.add('hidden');
            return;
        }

        document.getElementById('gen-result').classList.remove('hidden');
        document.getElementById('qr-canvas').classList.remove('qr-downloaded');

        const data = [r || ' ', g || ' ', b || ' '];
        let maxV = 1;
        data.forEach(t => { try { const q=qrcode(0,'M'); q.addData(t); q.make(); maxV=Math.max(maxV, (q.getModuleCount()-17)/4); } catch(e){} });
        const qrs = data.map(t => { const q=qrcode(maxV,'M'); q.addData(t); q.make(); return q; });
        
        const canvas = document.getElementById('qr-canvas');
        const count = qrs[0].getModuleCount(), size = 10, margin = 2, total = (count + margin*2)*size;
        canvas.width = canvas.height = total;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,total,total);

        for(let y=0; y<count; y++) {
            for(let x=0; x<count; x++) {
                const colors = qrs.map(q => q.isDark(y,x)?255:0);
                if(colors.some(c=>c)) {
                    ctx.fillStyle = `rgb(${colors[0]},${colors[1]},${colors[2]})`;
                    ctx.fillRect((x+margin)*size, (y+margin)*size, size, size);
                }
            }
        }
    }

    function downloadQR() {
        const link = document.createElement('a');
        link.download = `rgb-qr-${Date.now()}.png`;
        link.href = document.getElementById('qr-canvas').toDataURL();
        link.click();
        shutter.play();
        document.getElementById('qr-canvas').classList.add('qr-downloaded');
    }

    // СКАНИРОВАНИЕ
    async function startCamera() {
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const v = document.getElementById('video');
            v.srcObject = activeStream; v.play();
            document.getElementById('scan-controls').classList.add('hidden');
            const scanLoop = () => { if(activeStream) { decode(v); requestAnimationFrame(scanLoop); } };
            scanLoop();
        } catch(e) { alert("Камера недоступна"); }
    }

    function decode(source) {
        const temp = document.createElement('canvas');
        const ctx = temp.getContext('2d');
        temp.width = source.videoWidth || source.width;
        temp.height = source.videoHeight || source.height;
        ctx.drawImage(source, 0, 0);
        const img = ctx.getImageData(0,0,temp.width,temp.height);
        
        const ids = ['res-r', 'res-g', 'res-b'];
        let found = false;

        for(let c=0; c<3; c++) {
            const b = new Uint8ClampedArray(img.data.length);
            for(let i=0; i<img.data.length; i+=4) { b[i]=b[i+1]=b[i+2]=img.data[i+c]; b[i+3]=255; }
            const code = jsQR(b, temp.width, temp.height, { inversionAttempts: "attemptBoth" });
            if(code && code.data) {
                const el = document.getElementById(ids[c]);
                if(el.innerText.indexOf(code.data) === -1) {
                    el.innerText = ids[c].split('-')[1].toUpperCase() + ": " + code.data;
                    found = true;
                }
            }
        }
        if(found) shutter.play();
    }

    document.getElementById('file-in').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                document.getElementById('scan-controls').classList.add('hidden');
                const prev = document.getElementById('upload-preview');
                prev.src = img.src; prev.classList.remove('hidden');
                
                // Анимация луча
                const box = document.getElementById('scanner-box');
                box.classList.add('scanning');
                setTimeout(() => {
                    decode(img);
                    box.classList.remove('scanning');
                }, 2000);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
