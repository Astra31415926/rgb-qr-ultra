<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System v3.0 | Astra314</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #050505;
            --border: #111111;
            --text: #e0e0e0;
            --muted: #555;
            --r: #FF0000;
            --g: #00FF00;
            --b: #0000FF;
            --neon-w: 0 0 5px #fff, 0 0 10px #fff;
            --neon-r: 0 0 5px var(--r), 0 0 10px var(--r);
            --neon-g: 0 0 5px var(--g), 0 0 10px var(--g);
            --neon-b: 0 0 5px var(--b), 0 0 10px var(--b);
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }

        .btn-neon {
            border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 0.5rem 1rem;
            font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;
            background: transparent; transition: all 0.3s ease; cursor: pointer;
        }
        .btn-neon:hover { border-color: #fff; box-shadow: var(--neon-w); text-shadow: var(--neon-w); }

        .action-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .action-card:hover { background: rgba(255,255,255,0.05); border-color: #333; transform: translateY(-4px); }

        .input-rgb {
            background: rgba(0,0,0,0.8); border: 1px solid #111; color: #fff;
            padding: 1rem; width: 100%; resize: none; font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; overflow-y: hidden; transition: border-color 0.3s;
        }
        .input-rgb:focus { outline: none; }
        .input-rgb.input-r:focus { border-color: var(--r); box-shadow: inset 0 0 20px rgba(255,0,0,0.1); }
        .input-rgb.input-g:focus { border-color: var(--g); box-shadow: inset 0 0 20px rgba(0,255,0,0.1); }
        .input-rgb.input-b:focus { border-color: var(--b); box-shadow: inset 0 0 20px rgba(0,0,255,0.1); }

        #qr-canvas, #scan-preview-canvas { image-rendering: pixelated; }

        @keyframes scanLine { 
            0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 
            90% { opacity: 1; } 100% { top: 100%; opacity: 0; } 
        }
        .scan-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 15px 5px #fff;
            animation: scanLine 2s linear forwards; z-index: 10;
        }

        .flash-effect { animation: flash 0.5s ease-out; }
        @keyframes flash { 0%, 100% { box-shadow: none; opacity: 1; } 50% { box-shadow: inset 0 0 20px #fff; opacity: 0.9; border-color: #fff; } }

        .fade-q, .fade-scan { opacity: 0.2 !important; transition: opacity 1s ease; }
        .view { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .view.active { display: flex; flex-direction: column; opacity: 1; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #050505; border: 1px solid #222; padding: 2.5rem;
            max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative;
        }

        .result-box {
            background: #000; border: 1px solid #222; padding: 1rem;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            word-break: break-all; min-height: 60px; transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="menu-view" class="view active flex-grow justify-center items-center p-8">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-light tracking-wider">
                <span style="color: var(--r); text-shadow: var(--neon-r);">R</span><span style="color: var(--g); text-shadow: var(--neon-g);">G</span><span style="color: var(--b); text-shadow: var(--neon-b);">B</span>
                <span class="text-white ml-4">QR System</span>
            </h1>
            <p class="text-xs text-gray-600 mt-4 tracking-widest uppercase">Spectral Data Encoding v3.0</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 w-full max-w-3xl">
            <button onclick="navigateTo('gen')" class="action-card p-12 text-left">
                <div class="text-2xl font-bold mb-2">ГЕНЕРАЦІЯ</div>
                <div class="text-xs text-gray-500 uppercase">Generation Module</div>
            </button>
            <button onclick="navigateTo('scan')" class="action-card p-12 text-left">
                <div class="text-2xl font-bold mb-2">СКАНУВАННЯ</div>
                <div class="text-xs text-gray-500 uppercase">Spectral Analyzer</div>
            </button>
        </div>

        <div class="fixed bottom-8 flex gap-4 flex-wrap justify-center">
            <button onclick="openModal('howto')" class="btn-neon">Як користуватися</button>
            <button onclick="openModal('tech')" class="btn-neon">Технологія</button>
            <button onclick="openModal('author')" class="btn-neon">Автор</button>
        </div>
    </div>

    <div id="gen-view" class="view p-4 md:p-8">
        <div class="max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="resetToMenu()" class="btn-neon">Назад</button>
                <div class="text-xs text-gray-600 font-mono">LIVE ENCODER</div>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div style="border-left: 2px solid var(--r)"><textarea id="input-r" class="input-rgb input-r" rows="2" placeholder="RED CHANNEL DATA"></textarea></div>
                    <div style="border-left: 2px solid var(--g)"><textarea id="input-g" class="input-rgb input-g" rows="2" placeholder="GREEN CHANNEL DATA"></textarea></div>
                    <div style="border-left: 2px solid var(--b)"><textarea id="input-b" class="input-rgb input-b" rows="2" placeholder="BLUE CHANNEL DATA"></textarea></div>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <div id="qr-container" class="relative bg-black p-4 w-full max-w-xs aspect-square flex items-center justify-center border border-gray-900">
                        <div id="gen-placeholder" class="text-gray-700 text-xs text-center uppercase tracking-widest">Очікування введення...</div>
                        <canvas id="qr-canvas" class="hidden w-full h-full"></canvas>
                    </div>
                    <button id="btn-download" onclick="downloadQR()" class="btn-neon mt-8 hidden">СКАЧАТИ PNG</button>
                    <p id="post-download-msg" class="text-xs text-gray-600 mt-4 hidden text-center">
                        Зображення готове. Дізнайтеся більше у розділі <span class="underline cursor-pointer" onclick="openModal('tech')">ТЕХНОЛОГІЯ</span>.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="scan-view" class="view p-4 md:p-8">
        <div class="max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="resetToMenu()" class="btn-neon">Назад</button>
                <div class="text-xs text-gray-600 font-mono">SPECTRAL ANALYZER</div>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="flex flex-col items-center">
                    <div id="scan-ui-controls" class="flex gap-4 mb-4">
                        <button onclick="startCamera()" class="btn-neon">Камера</button>
                        <button onclick="document.getElementById('file-input').click()" class="btn-neon">Файл</button>
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                    </div>
                    <div id="scan-viewport" class="relative w-full aspect-square bg-black border border-gray-900 flex items-center justify-center overflow-hidden">
                        <video id="video" class="w-full h-full object-cover hidden" playsinline></video>
                        <canvas id="scan-preview-canvas" class="hidden w-full h-full object-contain"></canvas>
                        <div id="scan-placeholder" class="text-gray-700 text-xs text-center absolute uppercase tracking-widest">Виберіть джерело</div>
                    </div>
                    <div id="error-msg" class="text-red-500 text-xs mt-4 hidden font-bold tracking-widest uppercase">Сигнал не розпізнано</div>
                </div>
                <div class="space-y-4">
                    <div><label class="text-xs text-gray-500 mb-1 block">RED CHANNEL</label><div id="res-r" class="result-box border-red-500/30">---</div></div>
                    <div><label class="text-xs text-gray-500 mb-1 block">GREEN CHANNEL</label><div id="res-g" class="result-box border-green-500/30">---</div></div>
                    <div><label class="text-xs text-gray-500 mb-1 block">BLUE CHANNEL</label><div id="res-b" class="result-box border-blue-500/30">---</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-howto" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-howto">Як користуватися</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-howto" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>
    <div id="modal-tech" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-tech">Технологія</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-tech" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>
    <div id="modal-author" class="modal-overlay"><div class="modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold uppercase tracking-tight" id="title-author">Автор</h2><div class="flex gap-4"><button onclick="setLang('ua')" class="text-xs hover:text-white">UA</button><button onclick="setLang('en')" class="text-xs hover:text-white">EN</button><button onclick="closeModal()" class="text-gray-500 ml-4">[X]</button></div></div><div id="content-author" class="text-sm text-gray-300 space-y-4 leading-relaxed"></div></div></div>

    <script>
        const state = { lang: 'ua', stream: null, scanLoop: null, cameraActive: false };

        const content = {
            ua: {
                titles: { howto: "Як користуватися", tech: "Технологія", author: "Автор" },
                howto: `<p>На цьому сайті ви можете:</p><ul class="list-disc pl-5 space-y-2"><li>Створювати кольорові (спектральні) 2D-коди, де дані розподіляються по каналах.</li><li>Тестувати їх зчитування безпосередньо з екрана.</li></ul><p class="mt-4 p-3 bg-white/5 border-l-2 border-white/20 text-xs">🔒 <b>Приватність:</b> Сайт не зберігає ваші дані, все відбувається локально у вашому браузері.</p><p class="mt-4 text-yellow-300/70">⚠️ <b>Важливо:</b> Стабільне зчитування у друці потребує додаткових методів, посилання на які є в розділі АВТОР.</p>`,
                tech: `<p><b>Міжканальний шум та спектральна цілісність</b></p><p>Класичні QR-коди оптимізовані для чорно-білого контрасту. При друку в CMYK виникає проблема "міжканального шуму", де пігменти змішуються, заважаючи зчитуванню кольорових шарів.</p><p class="mt-2">Ця система використовує адитивну модель RGB, де кожен канал (R, G, B) є незалежним носієм інформації. Це дозволяє потроїти обсяг даних в одному коді.</p>`,
                author: `<p><b>Михайло Кашкаров</b></p><p class="text-gray-400 text-xs mb-4">Science-art художник, дослідник, інженер.</p><p>Спеціалізується на спектральному дизайні та людино-машинній взаємодії.</p><div class="mt-6 space-y-3 font-mono text-[10px] uppercase tracking-wider"><p>Email: <a href="mailto:bakminsterfuler@gmail.com" class="text-white underline">bakminsterfuler@gmail.com</a></p><p>Website: <a href="https://astra31415926.github.io/" target="_blank" class="text-white underline">astra31415926.github.io</a></p></div>`
            },
            en: {
                titles: { howto: "How to Use", tech: "Technology", author: "Author" },
                howto: `<p>On this site you can:</p><ul class="list-disc pl-5 space-y-2"><li>Create color (spectral) 2D codes where data is split by channels.</li><li>Test reading them directly from the screen.</li></ul><p class="mt-4 p-3 bg-white/5 border-l-2 border-white/20 text-xs">🔒 <b>Privacy:</b> This site does not store your data. Everything is processed locally.</p><p class="mt-4 text-yellow-300/70">⚠️ <b>Important:</b> Stable printing requires additional color correction methods (see AUTHOR section).</p>`,
                tech: `<p><b>Inter-channel Noise & Spectral Integrity</b></p><p>Classic QR codes rely on binary contrast. In CMYK printing, "channel noise" occurs when pigments overlap, making color-layer extraction difficult.</p><p class="mt-2">This system uses the RGB additive model, treating each channel as an independent data carrier to triple capacity.</p>`,
                author: `<p><b>Mykhailo Kashkarov</b></p><p class="text-gray-400 text-xs mb-4">Science-art artist, researcher, engineer.</p><div class="mt-6 space-y-3 font-mono text-[10px] uppercase tracking-wider"><p>Email: <a href="mailto:bakminsterfuler@gmail.com" class="text-white underline">bakminsterfuler@gmail.com</a></p><p>Website: <a href="https://astra31415926.github.io/" target="_blank" class="text-white underline">astra31415926.github.io</a></p></div>`
            }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'beep') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else { gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
        }

        function navigateTo(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id + '-view').classList.add('active'); }
        
        function resetToMenu() {
            if (state.stream) state.stream.getTracks().forEach(t => t.stop());
            cancelAnimationFrame(state.scanLoop); state.cameraActive = false;
            document.querySelectorAll('textarea').forEach(t => t.value = '');
            document.getElementById('qr-canvas').classList.add('hidden');
            document.getElementById('gen-placeholder').classList.remove('hidden');
            document.getElementById('video').classList.add('hidden');
            document.getElementById('scan-preview-canvas').classList.add('hidden');
            document.getElementById('scan-placeholder').classList.remove('hidden');
            document.getElementById('scan-ui-controls').classList.remove('hidden');
            document.querySelectorAll('.result-box').forEach(b => b.innerText = '---');
            navigateTo('menu');
        }

        function openModal(id) { document.getElementById('modal-' + id).classList.add('active'); updateModalContent(id); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
        function setLang(l) { state.lang = l; ['howto','tech','author'].forEach(updateModalContent); }
        function updateModalContent(id) { 
            const c = content[state.lang];
            const titleEl = document.getElementById('title-' + id);
            const contentEl = document.getElementById('content-' + id);
            if(titleEl) titleEl.innerText = c.titles[id];
            if(contentEl) contentEl.innerHTML = c[id];
        }

        // --- Generation ---
        document.querySelectorAll('.input-rgb').forEach(el => el.addEventListener('input', () => { 
            el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; 
            const data = [document.getElementById('input-r').value, document.getElementById('input-g').value, document.getElementById('input-b').value];
            if(!data.join('').trim()) return resetToMenu();
            
            let maxV = 0;
            data.forEach(t => { try { const q=qrcode(0,'M'); q.addData(unescape(encodeURIComponent(t||' '))); q.make(); maxV=Math.max(maxV, (q.getModuleCount()-17)/4); }catch(e){}});
            const qrs = data.map(t => { const q=qrcode(maxV,'M'); q.addData(unescape(encodeURIComponent(t||' '))); q.make(); return q; });
            
            const canvas = document.getElementById('qr-canvas'), ctx = canvas.getContext('2d'), mc = qrs[0].getModuleCount(), ms = 8, size = (mc+8)*ms;
            canvas.width = canvas.height = size; ctx.fillStyle = '#000'; ctx.fillRect(0,0,size,size);
            for(let y=0; y<mc; y++) for(let x=0; x<mc; x++) {
                const rgb = qrs.map(q => q.isDark(y,x)?255:0);
                if(rgb.some(v=>v)) { ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; ctx.fillRect((x+4)*ms, (y+4)*ms, ms, ms); }
            }
            canvas.classList.remove('hidden', 'fade-q'); document.getElementById('gen-placeholder').classList.add('hidden'); document.getElementById('btn-download').classList.remove('hidden');
        }));

        function downloadQR() { playSfx('shutter'); const a = document.createElement('a'); a.download = 'rgb-qr.png'; a.href = document.getElementById('qr-canvas').toDataURL(); a.click(); document.getElementById('qr-canvas').classList.add('fade-q'); document.getElementById('post-download-msg').classList.remove('hidden'); }

        // --- Scanning ---
        async function startCamera() {
            state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }});
            const v = document.getElementById('video'); v.srcObject = state.stream; v.play();
            v.classList.remove('hidden'); document.getElementById('scan-ui-controls').classList.add('hidden'); document.getElementById('scan-placeholder').classList.add('hidden');
            state.cameraActive = true; 
            const t = () => { if(state.cameraActive) { const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0); scan(c); requestAnimationFrame(t); }}; t();
        }

        document.getElementById('file-input').addEventListener('change', (e) => {
            const reader = new FileReader(); reader.onload = (evt) => {
                const img = new Image(); img.onload = () => {
                    const c = document.getElementById('scan-preview-canvas'); c.width=img.width; c.height=img.height; c.getContext('2d').drawImage(img,0,0);
                    c.classList.remove('hidden'); document.getElementById('scan-ui-controls').classList.add('hidden'); document.getElementById('scan-placeholder').classList.add('hidden');
                    const l = document.createElement('div'); l.className='scan-line'; document.getElementById('scan-viewport').appendChild(l);
                    setTimeout(() => { l.remove(); scan(c, true); }, 2000);
                }; img.src = evt.target.result;
            }; reader.readAsDataURL(e.target.files[0]);
        });

        function scan(canvas, fade=false) {
            const ctx = canvas.getContext('2d'), img = ctx.getImageData(0,0,canvas.width,canvas.height), ids = ['res-r','res-g','res-b'];
            let found = false;
            for(let i=0; i<3; i++) {
                const b = new Uint8ClampedArray(img.data.length);
                for(let j=0; j<img.data.length; j+=4) { b[j]=b[j+1]=b[j+2]=img.data[j+i]; b[j+3]=255; }
                const r = jsQR(b, canvas.width, canvas.height);
                if(r && r.data) { 
                    try { 
                        const txt = decodeURIComponent(escape(r.data)); 
                        if(document.getElementById(ids[i]).innerText !== txt) { document.getElementById(ids[i]).innerText = txt; document.getElementById(ids[i]).classList.add('flash-effect'); setTimeout(()=>document.getElementById(ids[i]).classList.remove('flash-effect'), 500); found = true; }
                    } catch(e){}
                }
            }
            if(found) { playSfx('beep'); if(fade) document.getElementById('scan-preview-canvas').classList.add('fade-scan'); }
        }
    </script>
</body>
</html>
