<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Triple QR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1f1f1f;
            --text: #e0e0e0;
            --muted: #666;
            
            --r-channel: #ff2a2a;
            --g-channel: #2aff2a;
            --b-channel: #2a9fff;
            
            --r-glow: rgba(255, 42, 42, 0.3);
            --g-glow: rgba(42, 255, 42, 0.3);
            --b-glow: rgba(42, 159, 255, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .bg-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            z-index: -2;
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, var(--r-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, var(--g-glow) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, var(--b-glow) 0%, transparent 40%);
            opacity: 0.4; filter: blur(80px);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .input-rgb {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .input-rgb:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.8);
        }

        .input-r:focus { border-color: var(--r-channel); box-shadow: 0 0 10px var(--r-glow); }
        .input-g:focus { border-color: var(--g-channel); box-shadow: 0 0 10px var(--g-glow); }
        .input-b:focus { border-color: var(--b-channel); box-shadow: 0 0 10px var(--b-glow); }

        .btn-primary {
            background: linear-gradient(135deg, #fff 0%, #ccc 100%);
            color: #000;
            font-weight: 700;
            padding: 14px 24px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-secondary:hover {
            border-color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .qr-display-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
        }

        .scanner-video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            display: block;
        }

        .result-grid { display: grid; gap: 12px; }

        .result-item {
            padding: 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .result-r { background: rgba(255, 42, 42, 0.1); border: 1px solid var(--r-channel); color: var(--r-channel); }
        .result-g { background: rgba(42, 255, 42, 0.1); border: 1px solid var(--g-channel); color: var(--g-channel); }
        .result-b { background: rgba(42, 159, 255, 0.1); border: 1px solid var(--b-channel); color: var(--b-channel); }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s;
        }

        .status-dot.active {
            background: var(--g-channel);
            box-shadow: 0 0 10px var(--g-channel);
        }

        /* Hidden file input */
        #file-input { display: none; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-dot.active { animation: pulse 2s infinite; }

    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-2 tracking-tight">
                <span style="color: var(--r-channel)">R</span><span style="color: var(--g-channel)">G</span><span style="color: var(--b-channel)">B</span> QR System
            </h1>
            <p class="text-sm" style="color: var(--muted)">Triple Channel Data Encoding & Decoding</p>
        </header>

        <!-- Tabs -->
        <div class="flex border-b mb-6" style="border-color: var(--border)">
            <button class="tab-btn active" data-tab="create">Создать</button>
            <button class="tab-btn" data-tab="scan">Сканировать</button>
        </div>

        <!-- CREATE TAB -->
        <div id="tab-create" class="tab-content">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Input Section -->
                <div class="space-y-4">
                    <div class="card p-4" style="border-left: 3px solid var(--r-channel)">
                        <label class="block text-xs uppercase tracking-wider mb-2 font-bold" style="color: var(--r-channel)">Red Channel</label>
                        <textarea id="input-red" class="input-rgb input-r" rows="2" placeholder="Данные для красного канала..."></textarea>
                    </div>
                    
                    <div class="card p-4" style="border-left: 3px solid var(--g-channel)">
                        <label class="block text-xs uppercase tracking-wider mb-2 font-bold" style="color: var(--g-channel)">Green Channel</label>
                        <textarea id="input-green" class="input-rgb input-g" rows="2" placeholder="Данные для зеленого канала..."></textarea>
                    </div>
                    
                    <div class="card p-4" style="border-left: 3px solid var(--b-channel)">
                        <label class="block text-xs uppercase tracking-wider mb-2 font-bold" style="color: var(--b-channel)">Blue Channel</label>
                        <textarea id="input-blue" class="input-rgb input-b" rows="2" placeholder="Данные для синего канала..."></textarea>
                    </div>

                    <button id="btn-generate" class="btn-primary w-full">
                        Сгенерировать RGB QR
                    </button>
                </div>

                <!-- Output Section -->
                <div>
                    <div class="qr-display-wrapper" id="qr-container">
                        <div id="placeholder" class="text-center p-8" style="color: var(--muted)">
                            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" class="mx-auto mb-4 opacity-50">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5z..." />
                            </svg>
                            <p class="text-sm">Введите данные в каналы</p>
                        </div>
                        <canvas id="qr-canvas" class="hidden"></canvas>
                    </div>
                    
                    <div class="mt-4 flex gap-2">
                        <button id="btn-download" class="btn-secondary flex-1 hidden">Скачать PNG</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SCAN TAB -->
        <div id="tab-scan" class="tab-content hidden">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Camera & Upload Section -->
                <div>
                    <div class="card p-4 mb-4">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2">
                                <div id="status-dot" class="status-dot"></div>
                                <span class="text-sm font-mono" id="status-text">Камера выключена</span>
                            </div>
                            <button id="btn-camera" class="btn-secondary py-2 px-4 text-xs">
                                Включить камеру
                            </button>
                        </div>
                        <video id="video" class="scanner-video hidden" playsinline></video>
                        <canvas id="scan-canvas" class="hidden"></canvas>
                        <div id="camera-placeholder" class="aspect-video flex items-center justify-center rounded bg-black/20">
                            <p class="text-sm" style="color: var(--muted)">Нажмите "Включить камеру"</p>
                        </div>
                    </div>

                    <!-- Upload Section -->
                    <div class="card p-4">
                        <h3 class="font-bold mb-3 text-sm uppercase tracking-wide">Или загрузите файл</h3>
                        <input type="file" id="file-input" accept="image/*">
                        <button id="btn-upload" class="btn-secondary w-full">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                            </svg>
                            Загрузить изображение
                        </button>
                    </div>
                </div>

                <!-- Results Section -->
                <div>
                    <h3 class="font-bold mb-4 text-lg">Результаты декодирования</h3>
                    <div class="result-grid">
                        <div class="result-item result-r">
                            <div class="text-xs uppercase opacity-60 mb-1">Red Channel</div>
                            <div id="res-r">Ожидание...</div>
                        </div>
                        <div class="result-item result-g">
                            <div class="text-xs uppercase opacity-60 mb-1">Green Channel</div>
                            <div id="res-green">Ожидание...</div>
                        </div>
                        <div class="result-item result-b">
                            <div class="text-xs uppercase opacity-60 mb-1">Blue Channel</div>
                            <div id="res-blue">Ожидание...</div>
                        </div>
                    </div>
                    <canvas id="file-canvas" class="hidden"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DOM Elements & State
        // ============================================
        const state = {
            stream: null,
            loop: null,
            lastResults: { r: null, g: null, b: null }
        };

        const els = {
            // Gen
            inputR: document.getElementById('input-red'),
            inputG: document.getElementById('input-green'),
            inputB: document.getElementById('input-blue'),
            btnGen: document.getElementById('btn-generate'),
            btnDl: document.getElementById('btn-download'),
            canvas: document.getElementById('qr-canvas'),
            placeholder: document.getElementById('placeholder'),

            // Scan
            btnCam: document.getElementById('btn-camera'),
            video: document.getElementById('video'),
            scanCanvas: document.getElementById('scan-canvas'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            camPlaceholder: document.getElementById('camera-placeholder'),

            // Upload
            fileInput: document.getElementById('file-input'),
            btnUpload: document.getElementById('btn-upload'),
            fileCanvas: document.getElementById('file-canvas'),

            // Results
            resR: document.getElementById('res-r'),
            resG: document.getElementById('res-green'),
            resB: document.getElementById('res-blue'),

            // Tabs
            tabBtns: document.querySelectorAll('.tab-btn'),
            tabContents: document.querySelectorAll('.tab-content')
        };

        // ============================================
        // Tab Switching
        // ============================================
        els.tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                els.tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                els.tabContents.forEach(c => c.classList.add('hidden'));
                document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            });
        });

        // ============================================
        // GENERATION LOGIC (Pixel Perfect)
        // ============================================
        function generateTripleQR() {
            const textR = els.inputR.value.trim();
            const textG = els.inputG.value.trim();
            const textB = els.inputB.value.trim();

            if (!textR && !textG && !textB) return;

            let maxModuleCount = 0;
            let targetVersion = 0;
            const dataArr = [textR || ' ', textG || ' ', textB || ' '];

            // Determine max version needed
            dataArr.forEach(text => {
                try {
                    const qr = qrcode(0, 'M');
                    qr.addData(text);
                    qr.make();
                    if (qr.getModuleCount() > maxModuleCount) {
                        maxModuleCount = qr.getModuleCount();
                        targetVersion = (qr.getModuleCount() - 17) / 4;
                    }
                } catch(e) { console.error(e); }
            });

            // Generate with synchronized version
            const qrs = dataArr.map(text => {
                try {
                    const qr = qrcode(targetVersion, 'M');
                    qr.addData(text);
                    qr.make();
                    return qr;
                } catch(e) {
                    // Fallback
                    const qr = qrcode(0, 'M');
                    qr.addData(text);
                    qr.make();
                    return qr;
                }
            });

            // Draw
            const moduleCount = qrs[0].getModuleCount();
            const moduleSize = 10;
            const margin = 4;
            const size = (moduleCount + margin * 2) * moduleSize;

            const canvas = els.canvas;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, size, size);

            for (let y = 0; y < moduleCount; y++) {
                for (let x = 0; x < moduleCount; x++) {
                    const darkR = qrs[0].isDark(y, x);
                    const darkG = qrs[1].isDark(y, x);
                    const darkB = qrs[2].isDark(y, x);

                    // Inverted logic: QR Dark = Data = Bright Color
                    const r = darkR ? 255 : 0;
                    const g = darkG ? 255 : 0;
                    const b = darkB ? 255 : 0;

                    if (r > 0 || g > 0 || b > 0) {
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                        ctx.fillRect(
                            (x + margin) * moduleSize,
                            (y + margin) * moduleSize,
                            moduleSize,
                            moduleSize
                        );
                    }
                }
            }

            els.canvas.classList.remove('hidden');
            els.placeholder.classList.add('hidden');
            els.btnDl.classList.remove('hidden');
        }

        // ============================================
        // DECODING LOGIC
        // ============================================
        
        /**
         * Universal processor for ImageData.
         * Splits channels and runs jsQR on each.
         */
        function processImageData(imageData) {
            const w = imageData.width;
            const h = imageData.height;
            const data = imageData.data;

            // Prepare buffers for grayscale images
            // We use Uint8ClampedArray for compatibility with ImageData
            const bufferR = new Uint8ClampedArray(w * h * 4);
            const bufferG = new Uint8ClampedArray(w * h * 4);
            const bufferB = new Uint8ClampedArray(w * h * 4);

            // Fill buffers with channel data
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];     // Red
                const g = data[i + 1]; // Green
                const b = data[i + 2]; // Blue

                // Red Channel Grayscale
                bufferR[i] = bufferR[i + 1] = bufferR[i + 2] = r;
                bufferR[i + 3] = 255;

                // Green Channel Grayscale
                bufferG[i] = bufferG[i + 1] = bufferG[i + 2] = g;
                bufferG[i + 3] = 255;

                // Blue Channel Grayscale
                bufferB[i] = bufferB[i + 1] = bufferB[i + 2] = b;
                bufferB[i + 3] = 255;
            }

            // Decode each channel
            decodeChannel(bufferR, w, h, 'r', els.resR);
            decodeChannel(bufferG, w, h, 'g', els.resG);
            decodeChannel(bufferB, w, h, 'b', els.resB);
        }

        function decodeChannel(buffer, w, h, channelKey, resultEl) {
            const imgData = new ImageData(buffer, w, h);
            
            // CRITICAL FIX: 'attemptBoth' is needed because our generated QR
            // is Light-on-Dark (Bright on Black), while standard is Dark-on-Light.
            const code = jsQR(imgData.data, w, h, {
                inversionAttempts: "attemptBoth"
            });

            if (code && code.data) {
                if (state.lastResults[channelKey] !== code.data) {
                    state.lastResults[channelKey] = code.data;
                    resultEl.textContent = code.data;
                    resultEl.style.opacity = 1;
                    // Flash effect
                    resultEl.style.transform = "scale(1.02)";
                    setTimeout(() => resultEl.style.transform = "scale(1)", 200);
                }
            }
        }

        // ============================================
        // CAMERA HANDLING
        // ============================================
        function tick() {
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const canvas = els.scanCanvas;
                const ctx = canvas.getContext('2d');
                canvas.width = els.video.videoWidth;
                canvas.height = els.video.videoHeight;
                
                ctx.drawImage(els.video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                processImageData(imageData);
            }
            state.loop = requestAnimationFrame(tick);
        }

        async function toggleCamera() {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
                state.stream = null;
                cancelAnimationFrame(state.loop);
                els.video.classList.add('hidden');
                els.camPlaceholder.classList.remove('hidden');
                els.statusDot.classList.remove('active');
                els.statusText.textContent = 'Камера выключена';
                els.btnCam.textContent = 'Включить камеру';
                return;
            }

            try {
                state.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                els.video.srcObject = state.stream;
                await els.video.play();
                
                els.video.classList.remove('hidden');
                els.camPlaceholder.classList.add('hidden');
                els.statusDot.classList.add('active');
                els.statusText.textContent = 'Сканирование...';
                els.btnCam.textContent = 'Выключить';
                
                tick();
            } catch (e) {
                console.error(e);
                alert("Ошибка доступа к камере");
            }
        }

        // ============================================
        // FILE UPLOAD HANDLING
        // ============================================
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const img = new Image();
                img.onload = function() {
                    const canvas = els.fileCanvas;
                    const ctx = canvas.getContext('2d');
                    
                    // Resize large images to prevent memory issues
                    const maxDim = 1024;
                    let w = img.width;
                    let h = img.height;
                    if (w > maxDim || h > maxDim) {
                        const ratio = Math.min(maxDim / w, maxDim / h);
                        w = Math.floor(w * ratio);
                        h = Math.floor(h * ratio);
                    }

                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const imageData = ctx.getImageData(0, 0, w, h);
                    processImageData(imageData);
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ============================================
        // Event Listeners
        // ============================================
        els.btnGen.addEventListener('click', generateTripleQR);
        els.btnDl.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'rgb-qr.png';
            link.href = els.canvas.toDataURL('image/png');
            link.click();
        });
        
        els.btnCam.addEventListener('click', toggleCamera);
        els.btnUpload.addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', handleFileUpload);

    </script>
</body>
</html>
