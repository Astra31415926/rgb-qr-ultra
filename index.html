<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB QR System v3.1 | Astra314</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --surface: #050505; --border: #111; --text: #e0e0e0; --r: #FF0000; --g: #00FF00; --b: #0000FF; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Кнопки та картки */
        .btn-neon { border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1rem; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
        .btn-neon:hover { border-color: #fff; box-shadow: 0 0 10px #fff; }
        
        /* Поля вводу */
        .input-rgb { background: #080808; border: 1px solid #111; color: #fff; padding: 1rem; width: 100%; resize: none; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; transition: 0.3s; }
        .input-r:focus { border-color: var(--r); outline: none; }
        .input-g:focus { border-color: var(--g); outline: none; }
        .input-b:focus { border-color: var(--b); outline: none; }

        /* Корекція фото (Адаптивне стискання) */
        #scan-preview-canvas { max-width: 150px !important; max-height: 150px !important; margin: 15px auto; border: 1px solid #222; image-rendering: pixelated; object-fit: contain; display: block; }
        .fade-scan { opacity: 0.4; filter: grayscale(1); }

        /* Модалки з прокруткою */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #050505; border: 1px solid #222; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        
        .result-box { background: #000; border: 1px solid #1a1a1a; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-top: 0.5rem; word-break: break-all; }
    </style>
</head>
<body class="flex flex-col items-center p-6">

    <header class="w-full max-w-2xl flex justify-between items-center mb-12">
        <h1 class="text-xl font-bold tracking-tighter">RGB QR <span class="font-light opacity-50">v3.1</span></h1>
        <nav class="flex gap-4">
            <button onclick="openModal('howto')" class="btn-neon">Як</button>
            <button onclick="openModal('tech')" class="btn-neon">Технологія</button>
            <button onclick="openModal('author')" class="btn-neon">Автор</button>
        </nav>
    </header>

    <main class="w-full max-w-2xl space-y-12">
        <section class="space-y-4">
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-30 text-center">Generator</p>
            <textarea id="input-r" class="input-rgb input-r" placeholder="RED CHANNEL (Кирилиця працює)"></textarea>
            <textarea id="input-g" class="input-rgb input-g" placeholder="GREEN CHANNEL"></textarea>
            <textarea id="input-b" class="input-rgb input-b" placeholder="BLUE CHANNEL"></textarea>
            <canvas id="qr-canvas" class="mx-auto hidden mt-6 border border-zinc-800"></canvas>
        </section>

        <section class="space-y-4 pt-8 border-t border-zinc-900">
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-30 text-center">Scanner</p>
            <div class="flex justify-center">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <button onclick="document.getElementById('file-input').click()" class="btn-neon border-white/40">Завантажити фото</button>
            </div>
            
            <canvas id="scan-preview-canvas" class="hidden"></canvas>

            <div class="grid gap-2 mt-6">
                <div class="result-box border-l-2 border-red-600"><span class="opacity-30 mr-2 text-[10px]">R:</span> <span id="res-r">-</span></div>
                <div class="result-box border-l-2 border-green-600"><span class="opacity-30 mr-2 text-[10px]">G:</span> <span id="res-g">-</span></div>
                <div class="result-box border-l-2 border-blue-600"><span class="opacity-30 mr-2 text-[10px]">B:</span> <span id="res-b">-</span></div>
            </div>
        </section>
    </main>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" class="text-lg font-bold uppercase mb-4 tracking-widest"></h2>
            <div id="modal-body" class="text-sm text-zinc-400 leading-relaxed space-y-4"></div>
            <button onclick="closeModal()" class="mt-8 text-[10px] uppercase opacity-50 hover:opacity-100">Закрити [x]</button>
        </div>
    </div>

    <script>
        const encoder = new TextEncoder();
        const decoder = new TextDecoder('utf-8');

        const content = {
            howto: { title: "Як користуватися", text: "<p>1. Введіть текст у будь-яке з трьох полів (Кожен колір — окремий шар даних).</p><p>2. Система автоматично згенерує кольоровий QR-код.</p><p>3. Для розкодування завантажте скріншот або фото. Система розділить кольори та зчитає кирилицю без помилок.</p>" },
            tech: { title: "Технологія", text: "<p><b>RGB-Multiplexing:</b> Використання адитивної моделі кольору для потроєння щільності даних.</p><p><b>UTF-8 Byte Encoding:</b> Виправлено проблему стандартних бібліотек QR, що не підтримували кирилицю. Тепер дані передаються у вигляді байтового масиву.</p>" },
            author: { title: "Автор", text: "<p><b>Михайло Кашкаров</b></p><p>Science-art інженер. Спеціалізація: спектральний дизайн та оптичні системи передачі даних.</p><p>Email: bakminsterfuler@gmail.com</p>" }
        };

        function openModal(id) {
            document.getElementById('modal-title').innerText = content[id].title;
            document.getElementById('modal-body').innerHTML = content[id].text;
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        // GENERATION
        document.querySelectorAll('.input-rgb').forEach(el => el.addEventListener('input', () => {
            const data = [document.getElementById('input-r').value, document.getElementById('input-g').value, document.getElementById('input-b').value];
            if (!data.join('').trim()) { document.getElementById('qr-canvas').classList.add('hidden'); return; }

            const qrs = data.map(text => {
                const q = qrcode(0, 'M');
                q.addData(Array.from(encoder.encode(text || " ")), 'Byte'); // КИРИЛИЦЯ FIX
                q.make();
                return q;
            });

            const canvas = document.getElementById('qr-canvas');
            const ctx = canvas.getContext('2d');
            const mc = qrs[0].getModuleCount();
            const ms = 6;
            canvas.width = canvas.height = mc * ms;
            canvas.classList.remove('hidden');

            for (let y = 0; y < mc; y++) {
                for (let x = 0; x < mc; x++) {
                    ctx.fillStyle = `rgb(${qrs[0].isDark(y,x)?255:0},${qrs[1].isDark(y,x)?255:0},${qrs[2].isDark(y,x)?255:0})`;
                    ctx.fillRect(x * ms, y * ms, ms, ms);
                }
            }
        }));

        // SCANNING
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.getElementById('scan-preview-canvas');
                    c.width = img.width; c.height = img.height;
                    c.getContext('2d').drawImage(img, 0, 0);
                    c.classList.remove('hidden', 'fade-scan');
                    
                    const imgData = c.getContext('2d').getImageData(0,0,c.width,c.height);
                    ['res-r', 'res-g', 'res-b'].forEach((id, i) => {
                        const gray = new Uint8ClampedArray(imgData.data.length);
                        for (let j=0; j<imgData.data.length; j+=4) {
                            gray[j]=gray[j+1]=gray[j+2]=imgData.data[j+i];
                            gray[j+3]=255;
                        }
                        const code = jsQR(gray, c.width, c.height);
                        document.getElementById(id).innerText = code ? code.data : "-";
                    });
                    c.classList.add('fade-scan');
                };
                img.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
