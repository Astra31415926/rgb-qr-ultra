<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RGB QR Ultra v4.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rgb-red': '#ff004d',
                        'rgb-green': '#00ff41',
                        'rgb-blue': '#0088ff',
                        'dark': '#0a0a0a',
                        'dark-card': '#111111',
                        'dark-border': '#1f1f1f',
                        'dark-lighter': '#161616',
                    },
                    fontFamily: {
                        'display': ['Space Grotesk', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --rgb-red: #ff004d;
            --rgb-green: #00ff41;
            --rgb-blue: #0088ff;
            --bg: #0a0a0a;
            --card: #111111;
            --border: #1f1f1f;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #e0e0e0;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        /* Typography */
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        /* Neon Glow Effects */
        .glow-red { box-shadow: 0 0 20px rgba(255, 0, 77, 0.3), 0 0 40px rgba(255, 0, 77, 0.1); }
        .glow-green { box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), 0 0 40px rgba(0, 255, 65, 0.1); }
        .glow-blue { box-shadow: 0 0 20px rgba(0, 136, 255, 0.3), 0 0 40px rgba(0, 136, 255, 0.1); }
        
        .text-glow-red { text-shadow: 0 0 10px rgba(255, 0, 77, 0.5); }
        .text-glow-green { text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .text-glow-blue { text-shadow: 0 0 10px rgba(0, 136, 255, 0.5); }
        
        /* Input Styling */
        .input-r { border-left: 3px solid var(--rgb-red); }
        .input-g { border-left: 3px solid var(--rgb-green); }
        .input-b { border-left: 3px solid var(--rgb-blue); }
        
        .input-r:focus { box-shadow: 0 0 0 2px rgba(255, 0, 77, 0.2), inset 0 0 20px rgba(255, 0, 77, 0.05); }
        .input-g:focus { box-shadow: 0 0 0 2px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05); }
        .input-b:focus { box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.2), inset 0 0 20px rgba(0, 136, 255, 0.05); }
        
        /* Scan Line Animation */
        @keyframes scanLine {
            0% { top: 0; opacity: 1; }
            90% { opacity: 1; }
            100% { top: calc(100% - 4px); opacity: 0.5; }
        }
        
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--rgb-green), var(--rgb-green), transparent);
            box-shadow: 0 0 20px var(--rgb-green), 0 0 40px var(--rgb-green);
            animation: scanLine 2s ease-in-out forwards;
        }
        
        /* Glitch Effect */
        @keyframes glitchSuccess {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            10% { transform: scale(1.02); filter: hue-rotate(90deg); }
            20% { transform: scale(0.98); filter: hue-rotate(-90deg); }
            30% { transform: scale(1.01); filter: hue-rotate(45deg); }
            40% { transform: scale(0.99); filter: hue-rotate(-45deg); }
            50% { transform: scale(1.03); filter: hue-rotate(180deg); }
            100% { transform: scale(1); filter: hue-rotate(0deg); }
        }
        
        .glitch-effect {
            animation: glitchSuccess 0.8s ease-out;
        }
        
        /* Flash Effect */
        @keyframes flashGreen {
            0% { opacity: 0; }
            30% { opacity: 0.6; }
            100% { opacity: 0; }
        }
        
        .flash-overlay {
            position: absolute;
            inset: 0;
            background: var(--rgb-green);
            opacity: 0;
            pointer-events: none;
        }
        
        .flash-overlay.active {
            animation: flashGreen 0.5s ease-out;
        }
        
        /* Fade In */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Staggered Fade */
        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
        
        /* Button Hover */
        .btn-neon {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-neon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        
        .btn-neon:hover::before {
            transform: translateX(100%);
        }
        
        /* Modal */
        .modal-backdrop {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        /* QR Preview Container */
        .qr-preview-container {
            transition: all 0.3s ease;
        }
        
        .qr-preview-container.focused {
            transform: scale(1.05);
        }
        
        /* Live Preview Mini */
        .live-preview {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* Camera Frame */
        .camera-frame {
            border: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .camera-frame.detected {
            border-color: var(--rgb-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Hide scrollbar in modal content */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Focus visible */
        button:focus-visible, input:focus-visible, textarea:focus-visible {
            outline: 2px solid var(--rgb-blue);
            outline-offset: 2px;
        }
        
        /* Result blocks */
        .result-block {
            transition: all 0.2s ease;
        }
        
        .result-block:active {
            transform: scale(0.98);
        }
        
        /* Noise texture overlay */
        .noise-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="noise-bg relative">
    <!-- Main App Container -->
    <div id="app" class="min-h-screen min-h-[100dvh] flex flex-col">
        
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-dark/95 backdrop-blur-md border-b border-dark-border">
            <div class="flex items-center justify-between px-4 py-3">
                <!-- Live Preview -->
                <div class="w-16 h-16 rounded-xl bg-dark-card border border-dark-border flex items-center justify-center overflow-hidden flex-shrink-0">
                    <canvas id="livePreviewCanvas" width="64" height="64" class="live-preview w-full h-full"></canvas>
                </div>
                
                <!-- Title -->
                <div class="flex-1 text-center px-2">
                    <h1 class="font-display font-bold text-lg sm:text-xl tracking-tight">
                        <span class="text-rgb-red">RGB</span> 
                        <span class="text-rgb-green">QR</span> 
                        <span class="text-rgb-blue">Ultra</span>
                        <span class="text-gray-500 text-sm ml-1">v4.0</span>
                    </h1>
                </div>
                
                <!-- Menu Button -->
                <button id="menuBtn" class="w-10 h-10 rounded-xl bg-dark-card border border-dark-border flex items-center justify-center flex-shrink-0 hover:border-rgb-blue transition-colors" aria-label="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            
            <!-- Tab Navigation -->
            <nav class="flex border-b border-dark-border bg-dark-card/50">
                <button id="tabGenerate" class="flex-1 py-3 px-4 font-display font-medium text-sm transition-all border-b-2 border-rgb-red text-rgb-red" data-tab="generate">
                    Generate
                </button>
                <button id="tabScan" class="flex-1 py-3 px-4 font-display font-medium text-sm transition-all border-b-2 border-transparent text-gray-500 hover:text-gray-300" data-tab="scan">
                    Scan
                </button>
            </nav>
            
            <!-- Generate Section -->
            <section id="generateSection" class="flex-1 flex flex-col p-4 pt-3">
                
                <!-- Input Fields -->
                <div class="space-y-3 mb-4">
                    <!-- Red Channel -->
                    <div class="relative">
                        <label class="absolute -top-2 left-3 px-1 text-xs font-medium text-rgb-red bg-dark z-10">Red Channel</label>
                        <textarea 
                            id="inputR" 
                            class="input-r w-full bg-dark-card border border-dark-border rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-rgb-red/50 transition-all placeholder-gray-600"
                            rows="2"
                            placeholder="Enter text for red channel..."
                            maxlength="500"
                        ></textarea>
                        <span class="absolute bottom-2 right-3 text-xs text-gray-600" id="countR">0/500</span>
                    </div>
                    
                    <!-- Green Channel -->
                    <div class="relative">
                        <label class="absolute -top-2 left-3 px-1 text-xs font-medium text-rgb-green bg-dark z-10">Green Channel</label>
                        <textarea 
                            id="inputG" 
                            class="input-g w-full bg-dark-card border border-dark-border rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-rgb-green/50 transition-all placeholder-gray-600"
                            rows="2"
                            placeholder="Enter text for green channel..."
                            maxlength="500"
                        ></textarea>
                        <span class="absolute bottom-2 right-3 text-xs text-gray-600" id="countG">0/500</span>
                    </div>
                    
                    <!-- Blue Channel -->
                    <div class="relative">
                        <label class="absolute -top-2 left-3 px-1 text-xs font-medium text-rgb-blue bg-dark z-10">Blue Channel</label>
                        <textarea 
                            id="inputB" 
                            class="input-b w-full bg-dark-card border border-dark-border rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-rgb-blue/50 transition-all placeholder-gray-600"
                            rows="2"
                            placeholder="Enter text for blue channel..."
                            maxlength="500"
                        ></textarea>
                        <span class="absolute bottom-2 right-3 text-xs text-gray-600" id="countB">0/500</span>
                    </div>
                </div>
                
                <!-- QR Preview -->
                <div class="qr-preview-container flex-1 flex flex-col items-center justify-center py-4" id="qrPreviewContainer">
                    <div class="relative bg-dark-card rounded-2xl p-4 border border-dark-border">
                        <canvas id="qrCanvas" width="256" height="256" class="rounded-lg"></canvas>
                        <div class="flash-overlay rounded-lg" id="qrFlash"></div>
                    </div>
                    <p class="text-xs text-gray-500 mt-3 text-center">Tap QR to download</p>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex gap-3 mt-4">
                    <button id="btnGenerate" class="btn-neon flex-1 bg-gradient-to-r from-rgb-red via-rgb-green to-rgb-blue text-black font-display font-bold py-3 px-6 rounded-xl hover:opacity-90 transition-opacity">
                        Generate QR
                    </button>
                    <button id="btnDownload" class="btn-neon bg-dark-card border border-dark-border font-display font-medium py-3 px-6 rounded-xl hover:border-gray-600 transition-colors flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        PNG
                    </button>
                </div>
            </section>
            
            <!-- Scan Section -->
            <section id="scanSection" class="flex-1 flex flex-col p-4 hidden">
                
                <!-- Input Method Selection -->
                <div id="scanMethodSelect" class="flex-1 flex flex-col items-center justify-center">
                    <p class="text-gray-400 text-sm mb-6">Select input method</p>
                    
                    <div class="flex gap-4 w-full max-w-sm">
                        <button id="btnCamera" class="btn-neon flex-1 bg-dark-card border border-dark-border rounded-2xl p-6 flex flex-col items-center gap-3 hover:border-rgb-green transition-colors">
                            <div class="w-16 h-16 rounded-xl bg-dark flex items-center justify-center">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-rgb-green">
                                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                                    <circle cx="12" cy="13" r="4"/>
                                </svg>
                            </div>
                            <span class="font-display font-medium">Camera</span>
                        </button>
                        
                        <button id="btnFile" class="btn-neon flex-1 bg-dark-card border border-dark-border rounded-2xl p-6 flex flex-col items-center gap-3 hover:border-rgb-blue transition-colors">
                            <div class="w-16 h-16 rounded-xl bg-dark flex items-center justify-center">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-rgb-blue">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                            </div>
                            <span class="font-display font-medium">File</span>
                        </button>
                    </div>
                    
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>
                
                <!-- Camera View -->
                <div id="cameraView" class="hidden flex-1 flex flex-col">
                    <div class="relative rounded-2xl overflow-hidden bg-dark-card border border-dark-border camera-frame" id="cameraFrame">
                        <video id="cameraVideo" class="w-full h-auto max-h-[45vh] object-cover" playsinline></video>
                        <canvas id="cameraCanvas" class="hidden"></canvas>
                        <div class="flash-overlay" id="cameraFlash"></div>
                        
                        <!-- Scanning Overlay -->
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div class="w-48 h-48 border-2 border-rgb-green/50 rounded-lg" id="scanTarget">
                                <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-rgb-green rounded-tl-lg"></div>
                                <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-rgb-green rounded-tr-lg"></div>
                                <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-rgb-green rounded-bl-lg"></div>
                                <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-rgb-green rounded-br-lg"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Camera Controls -->
                    <div class="flex gap-3 mt-4">
                        <button id="btnCancelCamera" class="flex-1 bg-dark-card border border-dark-border font-display font-medium py-3 px-6 rounded-xl hover:border-gray-600 transition-colors">
                            Cancel
                        </button>
                    </div>
                </div>
                
                <!-- File Scan View -->
                <div id="fileScanView" class="hidden flex-1 flex flex-col">
                    <div class="relative rounded-2xl overflow-hidden bg-dark-card border border-dark-border" id="fileScanContainer">
                        <img id="fileScanImage" class="w-full h-auto max-h-[50vh] object-contain" alt="Uploaded image">
                        <div class="scan-line hidden" id="scanLine"></div>
                        <div class="flash-overlay" id="fileFlash"></div>
                    </div>
                </div>
                
                <!-- Scan Results -->
                <div id="scanResults" class="hidden mt-4 space-y-3">
                    <p class="text-xs text-gray-500 text-center mb-2">Tap to copy</p>
                    
                    <div class="result-block bg-dark-card border-l-4 border-rgb-red rounded-xl p-4 cursor-pointer fade-in fade-in-delay-1" data-channel="r">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-display font-medium text-rgb-red">RED CHANNEL</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </div>
                        <p class="text-sm break-all" id="resultR">-</p>
                    </div>
                    
                    <div class="result-block bg-dark-card border-l-4 border-rgb-green rounded-xl p-4 cursor-pointer fade-in fade-in-delay-2" data-channel="g">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-display font-medium text-rgb-green">GREEN CHANNEL</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </div>
                        <p class="text-sm break-all" id="resultG">-</p>
                    </div>
                    
                    <div class="result-block bg-dark-card border-l-4 border-rgb-blue rounded-xl p-4 cursor-pointer fade-in fade-in-delay-3" data-channel="b">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-display font-medium text-rgb-blue">BLUE CHANNEL</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </div>
                        <p class="text-sm break-all" id="resultB">-</p>
                    </div>
                </div>
                
                <!-- Error Message -->
                <div id="scanError" class="hidden mt-4 bg-dark-card border border-dark-border rounded-xl p-4 text-center">
                    <p class="text-gray-400 text-sm">QR not recognized. Please try again.</p>
                </div>
                
                <!-- New Scan Button -->
                <button id="btnNewScan" class="hidden btn-neon mt-4 bg-gradient-to-r from-rgb-red via-rgb-green to-rgb-blue text-black font-display font-bold py-3 px-6 rounded-xl">
                    Scan Another
                </button>
            </section>
        </main>
        
        <!-- Bottom Navigation -->
        <nav class="border-t border-dark-border bg-dark-card/50 px-2 py-2">
            <div class="flex justify-around">
                <button class="info-btn flex flex-col items-center gap-1 py-2 px-4 rounded-xl hover:bg-dark-lighter transition-colors" data-modal="author">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-rgb-red">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span class="text-xs text-gray-400">Author</span>
                </button>
                
                <button class="info-btn flex flex-col items-center gap-1 py-2 px-4 rounded-xl hover:bg-dark-lighter transition-colors" data-modal="howto">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-rgb-green">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <span class="text-xs text-gray-400">How to use</span>
                </button>
                
                <button class="info-btn flex flex-col items-center gap-1 py-2 px-4 rounded-xl hover:bg-dark-lighter transition-colors" data-modal="tech">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-rgb-blue">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                        <polyline points="2 17 12 22 22 17"/>
                        <polyline points="2 12 12 17 22 12"/>
                    </svg>
                    <span class="text-xs text-gray-400">Technology</span>
                </button>
                
                <button class="info-btn flex flex-col items-center gap-1 py-2 px-4 rounded-xl hover:bg-dark-lighter transition-colors" data-modal="publications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-purple-400">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span class="text-xs text-gray-400">Publications</span>
                </button>
            </div>
        </nav>
    </div>
    
    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0 bg-black/80" id="modalBackdrop"></div>

    <script>
    // ============================================
    // RGB QR Ultra v4.0 - Main Application

    (function() {
        'use strict';
        
        // ----------------------------------------

        const COLORS = {

            green: '#00ff41',

        // ----------------------------------------
        // DOM Elements Cache
        // ----------------------------------------
        let elements = {};
        
        function cacheElements() {
            elements = {

                cameraCanvas: document.getElementById('cameraCanvas'),
                cameraFrame: document.getElementById('cameraFrame'),

                fileScanView: document.getElementById('fileScanView'),

                fileFlash: document.getElementById('fileFlash'),
                
                scanResults: document.getElementById('scanResults'),
                resultR: document.getElementById('resultR'),

                toastText: document.getElementById('toastText')

        }
        
        // ----------------------------------------
        // State Management
        // ----------------------------------------
        const state = {
            currentTab: 'generate',
            cameraStream: null,
            scanAnimationId: null,
            lastGeneratedData: { r: '', g: '', b: '' }
        };
        
        // ----------------------------------------
        // Audio - Shutter Sound (Web Audio API)
        // ----------------------------------------
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playShutterSound() {
            try {
                initAudio();
                
                const now = audioContext.currentTime;
                
                // Click sound
                const osc1 = audioContext.createOscillator();
                const gain1 = audioContext.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(800, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + 0.05);
                gain1.gain.setValueAtTime(0.1, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc1.connect(gain1);
                gain1.connect(audioContext.destination);
                osc1.start(now);
                osc1.stop(now + 0.05);
                
                // Shutter sound
                const noise = audioContext.createBufferSource();
                const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = Math.random() * 2 - 1;
                }
                noise.buffer = noiseBuffer;
                
                const noiseGain = audioContext.createGain();
                const noiseFilter = audioContext.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 2000;
                noiseFilter.Q.value = 1;
                
                noiseGain.gain.setValueAtTime(0.15, now + 0.02);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioContext.destination);
                noise.start(now + 0.02);
                noise.stop(now + 0.12);
                
            } catch (e) {
                console.log('Audio not available:', e);
            }
        }
        
        // ----------------------------------------
        // Toast Notifications
        // ----------------------------------------
        let toastTimeout = null;
        
        function showToast(message, duration = 2000) {
            elements.toastText.textContent = message;
            elements.toast.classList.remove('opacity-0');
            elements.toast.classList.add('opacity-100');
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                elements.toast.classList.remove('opacity-100');
                elements.toast.classList.add('opacity-0');
            }, duration);
        }
        
        // ----------------------------------------
        // Tab Navigation
        // ----------------------------------------
        function switchTab(tab) {
            state.currentTab = tab;
            
            // Update tab buttons
            const tabs = [elements.tabGenerate, elements.tabScan];
            tabs.forEach(t => {
                const isActive = t.dataset.tab === tab;
                t.classList.toggle('border-rgb-red', isActive && tab === 'generate');
                t.classList.toggle('border-rgb-green', isActive && tab === 'scan');
                t.classList.toggle('border-transparent', !isActive);
                t.classList.toggle('text-rgb-red', isActive && tab === 'generate');
                t.classList.toggle('text-rgb-green', isActive && tab === 'scan');
                t.classList.toggle('text-gray-500', !isActive);
            });
            
            // Update sections
            elements.generateSection.classList.toggle('hidden', tab !== 'generate');
            elements.scanSection.classList.toggle('hidden', tab !== 'scan');
            
            // Reset scan view when switching to scan tab
            if (tab === 'scan') {
                resetScanView();
            }
        }
        
        // ----------------------------------------
        // QR Generation
        // ----------------------------------------
        async function generateQRCode(data, color) {
            return new Promise((resolve) => {
                const tempCanvas = document.createElement('canvas');
                QRCode.toCanvas(tempCanvas, data, {
                    width: CONFIG.QR_SIZE,
                    margin: 1,
                    color: {
                        dark: color,
                        light: '#000000'
                    },
                    errorCorrectionLevel: 'M'
                }, (error) => {
                    if (error) {
                        console.error('QR generation error:', error);
                        resolve(null);
                    } else {
                        resolve(tempCanvas);
                    }
                });
            });
        }
        
        async function combineQRChannels(dataR, dataG, dataB) {
            const canvas = elements.qrCanvas;
            const ctx = canvas.getContext('2d');
            canvas.width = CONFIG.QR_SIZE;
            canvas.height = CONFIG.QR_SIZE;
            
            // Clear canvas
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE);
            
            // Generate each channel
            const [qrR, qrG, qrB] = await Promise.all([
                dataR ? generateQRCode(dataR, '#ff0000') : null,
                dataG ? generateQRCode(dataG, '#00ff00') : null,
                dataB ? generateQRCode(dataB, '#0000ff') : null
            ]);
            
            // Get image data
            const imageData = ctx.createImageData(CONFIG.QR_SIZE, CONFIG.QR_SIZE);
            const pixels = imageData.data;
            
            // Combine channels
            for (let i = 0; i < CONFIG.QR_SIZE * CONFIG.QR_SIZE; i++) {
                const idx = i * 4;
                
                if (qrR) {
                    const rData = qrR.getContext('2d').getImageData(0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE).data;
                    pixels[idx] = rData[idx] > 128 ? 255 : 0;
                }
                
                if (qrG) {
                    const gData = qrG.getContext('2d').getImageData(0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE).data;
                    pixels[idx + 1] = gData[idx + 1] > 128 ? 255 : 0;
                }
                
                if (qrB) {
                    const bData = qrB.getContext('2d').getImageData(0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE).data;
                    pixels[idx + 2] = bData[idx + 2] > 128 ? 255 : 0;
                }
                
                pixels[idx + 3] = 255;
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Update live preview
            updateLivePreview();
            
            // Flash effect
            triggerFlash(elements.qrFlash);
            
            // Glitch effect
            elements.qrPreviewContainer.classList.add('glitch-effect');
            setTimeout(() => {
                elements.qrPreviewContainer.classList.remove('glitch-effect');
            }, CONFIG.GLITCH_DURATION);
        }
        
        function updateLivePreview() {
            const previewCtx = elements.livePreviewCanvas.getContext('2d');
            previewCtx.imageSmoothingEnabled = false;
            previewCtx.drawImage(
                elements.qrCanvas, 
                0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE,
                0, 0, CONFIG.PREVIEW_SIZE, CONFIG.PREVIEW_SIZE
            );
        }
        
        function triggerFlash(element) {
            element.classList.remove('active');
            void element.offsetWidth; // Force reflow
            element.classList.add('active');
            setTimeout(() => element.classList.remove('active'), CONFIG.FLASH_DURATION);
        }
        
        async function handleGenerate() {
            const dataR = elements.inputR.value.trim();
            const dataG = elements.inputG.value.trim();
            const dataB = elements.inputB.value.trim();
            
            if (!dataR && !dataG && !dataB) {
                showToast('Enter data in at least one channel');
                return;
            }
            
            state.lastGeneratedData = { r: dataR, g: dataG, b: dataB };
            
            elements.btnGenerate.disabled = true;
            elements.btnGenerate.textContent = 'Generating...';
            
            await combineQRChannels(dataR, dataG, dataB);
            
            elements.btnGenerate.disabled = false;
            elements.btnGenerate.textContent = 'Generate QR';
            
            playShutterSound();
        }
        
        function handleDownload() {
            const link = document.createElement('a');
            link.download = 'rgb-qr-ultra.png';
            link.href = elements.qrCanvas.toDataURL('image/png');
            link.click();
            showToast('QR code downloaded');
        }
        
        // ----------------------------------------
        // QR Scanning
        // ----------------------------------------
        function extractChannelData(imageData, channel) {
            const { width, height, data } = imageData;
            const channelData = new Uint8ClampedArray(width * height * 4);
            
            for (let i = 0; i < data.length; i += 4) {
                const idx = i;
                let value = 0;
                
                if (channel === 'r') value = data[idx];
                else if (channel === 'g') value = data[idx + 1];
                else if (channel === 'b') value = data[idx + 2];
                
                // Threshold
                const bw = value > 128 ? 255 : 0;
                channelData[idx] = bw;
                channelData[idx + 1] = bw;
                channelData[idx + 2] = bw;
                channelData[idx + 3] = 255;
            }
            
            return new ImageData(channelData, width, height);
        }
        
        function scanQRFromImageData(imageData) {
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: 'dontInvert'
            });
            return code ? code.data : null;
        }
        
        // ----------------------------------------
        // Camera Scanning
        // ----------------------------------------
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                state.cameraStream = stream;
                elements.cameraVideo.srcObject = stream;
                await elements.cameraVideo.play();
                
                elements.scanMethodSelect.classList.add('hidden');
                elements.cameraView.classList.remove('hidden');
                elements.scanResults.classList.add('hidden');
                elements.scanError.classList.add('hidden');
                elements.btnNewScan.classList.add('hidden');
                
                // Start scanning loop
                startCameraScanning();
                
            } catch (error) {
                console.error('Camera error:', error);
                showToast('Camera access denied or not available');
            }
        }
        
        function stopCamera() {
            if (state.cameraStream) {
                state.cameraStream.getTracks().forEach(track => track.stop());
                state.cameraStream = null;
            }
            
            if (state.scanAnimationId) {
                cancelAnimationFrame(state.scanAnimationId);
                state.scanAnimationId = null;
            }
        }
        
        function startCameraScanning() {
            const video = elements.cameraVideo;
            const canvas = elements.cameraCanvas;
            const ctx = canvas.getContext('2d');
            
            function scanFrame() {
                if (!state.cameraStream || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    state.scanAnimationId = requestAnimationFrame(scanFrame);
                    return;
                }
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Scan all channels
                const rChannel = extractChannelData(imageData, 'r');
                const gChannel = extractChannelData(imageData, 'g');
                const bChannel = extractChannelData(imageData, 'b');
                
                const rData = scanQRFromImageData(rChannel);
                const gData = scanQRFromImageData(gChannel);
                const bData = scanQRFromImageData(bChannel);
                
                if (rData || gData || bData) {
                    elements.cameraFrame.classList.add('detected');
                } else {
                    elements.cameraFrame.classList.remove('detected');
                }
                
                // If all channels found (or at least one with content)
                if (rData || gData || bData) {
                    // Found something!
                    handleScanSuccess(rData, gData, bData, video);
                    return;
                }
                
                state.scanAnimationId = requestAnimationFrame(scanFrame);
            }
            
            scanFrame();
        }
        
        function handleScanSuccess(rData, gData, bData, sourceElement) {
            playShutterSound();
            
            // Flash effect
            triggerFlash(elements.cameraFlash);
            
            // Glitch on camera frame
            elements.cameraFrame.classList.add('glitch-effect');
            
            setTimeout(() => {
                stopCamera();
                
                elements.cameraFrame.classList.remove('glitch-effect', 'detected');
                elements.cameraView.classList.add('hidden');
                
                // Show results
                showScanResults(rData, gData, bData);
            }, 1000);
        }
        
        // ----------------------------------------
        // File Scanning
        // ----------------------------------------
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    elements.fileScanImage.src = event.target.result;
                    elements.scanMethodSelect.classList.add('hidden');
                    elements.fileScanView.classList.remove('hidden');
                    elements.scanResults.classList.add('hidden');
                    elements.scanError.classList.add('hidden');
                    elements.btnNewScan.classList.add('hidden');
                    
                    // Start scan animation
                    setTimeout(() => startFileScan(img), 100);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function startFileScan(img) {
            // Show scan line
            elements.scanLine.classList.remove('hidden');
            
            // After animation, process image
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Extract and scan each channel
                const rChannel = extractChannelData(imageData, 'r');
                const gChannel = extractChannelData(imageData, 'g');
                const bChannel = extractChannelData(imageData, 'b');
                
                const rData = scanQRFromImageData(rChannel);
                const gData = scanQRFromImageData(gChannel);
                const bData = scanQRFromImageData(bChannel);
                
                // Hide scan line
                elements.scanLine.classList.add('hidden');
                
                // Flash
                triggerFlash(elements.fileFlash);
                
                // Hide image after delay
                setTimeout(() => {
                    elements.fileScanView.classList.add('hidden');
                    
                    if (rData || gData || bData) {
                        playShutterSound();
                        showScanResults(rData, gData, bData);
                    } else {
                        elements.scanError.classList.remove('hidden');
                        elements.btnNewScan.classList.remove('hidden');
                    }
                }, 500);
                
            }, CONFIG.SCAN_DURATION);
        }
        
        function showScanResults(rData, gData, bData) {
            elements.resultR.textContent = rData || 'No data';
            elements.resultG.textContent = gData || 'No data';
            elements.resultB.textContent = bData || 'No data';
            
            // Reset animation classes
            const blocks = elements.scanResults.querySelectorAll('.result-block');
            blocks.forEach(block => {
                block.classList.remove('fade-in', 'fade-in-delay-1', 'fade-in-delay-2', 'fade-in-delay-3');
                void block.offsetWidth; // Force reflow
            });
            
            blocks[0].classList.add('fade-in', 'fade-in-delay-1');
            blocks[1].classList.add('fade-in', 'fade-in-delay-2');
            blocks[2].classList.add('fade-in', 'fade-in-delay-3');
            
            elements.scanResults.classList.remove('hidden');
            elements.btnNewScan.classList.remove('hidden');
        }
        
        function resetScanView() {
            stopCamera();
            elements.scanMethodSelect.classList.remove('hidden');
            elements.cameraView.classList.add('hidden');
            elements.fileScanView.classList.add('hidden');
            elements.scanResults.classList.add('hidden');
            elements.scanError.classList.add('hidden');
            elements.btnNewScan.classList.add('hidden');
            elements.cameraFrame.classList.remove('detected', 'glitch-effect');
            elements.fileInput.value = '';
        }
        
        // ----------------------------------------
        // Clipboard
        // ----------------------------------------
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Copied to clipboard');
            } catch (e) {
                showToast('Failed to copy');
            }
            document.body.removeChild(textarea);
        }

                            <p class="text-rgb-green text-sm font-medium">Medium Article</p>
                            <p class="text-xs text-gray-500 mt-1">SCI Universal Model - Spectral Response Normalization</p>
                        </a>
                        <a href="https://telegra.ph/White-Paper-SCI-Encoding--Tehnolog%D1%96ya-spektralnoi-c%D1%96l%D1%96snost%D1%96-kanal%D1%96v-dlya-kolorovih-2D-kod%D1%96v-02-22" target="_blank" class="block p-4 bg-dark rounded-xl border border-dark-border hover:border-rgb-red transition-colors">
                            <p class="text-rgb-red text-sm font-medium">Telegraph - White Paper</p>
                            <p class="text-xs text-gray-500 mt-1">SCI Encoding Technology</p>
                        </a>
                        <a href="https://telegra.ph/RSS-Reflectance-Synchronized-System-02-19" target="_blank" class="block p-4 bg-dark rounded-xl border border-dark-border hover:border-purple-400 transition-colors">
                            <p class="text-purple-400 text-sm font-medium">Telegraph - RSS System</p>
                            <p class="text-xs text-gray-500 mt-1">Reflectance Synchronized System</p>
                        </a>
                    </div>
                `
            }
        };
        
        function openModal(type) {
            const content = modalContent[type];
            if (!content) return;
            
            elements.modalTitle.textContent = content.title;
            elements.modalContent.innerHTML = content.content;
            elements.modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            elements.modal.classList.add('hidden');
            document.body.style.overflow = '';
        }
        
        // ----------------------------------------
        // Input Character Count
        // ----------------------------------------
        function updateCharCount(input, countEl) {
            const count = input.value.length;
            countEl.textContent = `${count}/${CONFIG.MAX_DATA_LENGTH}`;
        }
        
        // ----------------------------------------
        // Live Preview Update
        // ----------------------------------------
        let previewTimeout = null;
        
        function schedulePreviewUpdate() {
            if (previewTimeout) clearTimeout(previewTimeout);
            previewTimeout = setTimeout(() => {
                const hasData = elements.inputR.value.trim() || 
                               elements.inputG.value.trim() || 
                               elements.inputB.value.trim();
                if (hasData) {
                    generateLivePreview();
                }
            }, 300);
        }
        
        async function generateLivePreview() {
            const dataR = elements.inputR.value.trim();
            const dataG = elements.inputG.value.trim();
            const dataB = elements.inputB.value.trim();
            
            if (!dataR && !dataG && !dataB) return;
            
            await combineQRChannels(dataR, dataG, dataB);
        }
        
        // ----------------------------------------
        // Event Listeners Setup
        // ----------------------------------------
        function setupEventListeners() {
            // Tab navigation
            elements.tabGenerate.addEventListener('click', () => switchTab('generate'));
            elements.tabScan.addEventListener('click', () => switchTab('scan'));
            
            // Generate
            elements.btnGenerate.addEventListener('click', handleGenerate);
            elements.btnDownload.addEventListener('click', handleDownload);
            elements.qrCanvas.addEventListener('click', handleDownload);
            
            // Input updates
            ['R', 'G', 'B'].forEach(channel => {
                const input = elements[`input${channel}`];
                const count = elements[`count${channel}`];
                
                input.addEventListener('input', () => {
                    updateCharCount(input, count);
                    schedulePreviewUpdate();
                });
                
                input.addEventListener('focus', () => {
                    elements.qrPreviewContainer.classList.add('focused');
                });
                
                input.addEventListener('blur', () => {
                    elements.qrPreviewContainer.classList.remove('focused');
                });
            });
            
            // Scan - Camera
            elements.btnCamera.addEventListener('click', startCamera);
            elements.btnCancelCamera.addEventListener('click', resetScanView);
            
            // Scan - File
            elements.btnFile.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', handleFileSelect);
            elements.btnNewScan.addEventListener('click', resetScanView);
            
            // Copy results
            elements.scanResults.querySelectorAll('.result-block').forEach(block => {
                block.addEventListener('click', () => {
                    const channel = block.dataset.channel;
                    const text = elements[`result${channel.toUpperCase()}`].textContent;
                    if (text && text !== 'No data' && text !== '-') {
                        copyToClipboard(text);
                    }
                });
            });
            
            // Modal
            document.querySelectorAll('.info-btn').forEach(btn => {
                btn.addEventListener('click', () => openModal(btn.dataset.modal));
            });
            
            elements.modalClose.addEventListener('click', closeModal);
            elements.modalBackdrop.addEventListener('click', closeModal);
            
            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !elements.modal.classList.contains('hidden')) {
                    closeModal();
                }
            });
            
            // Menu button (toggle between sections)
            elements.menuBtn.addEventListener('click', () => {
                const currentTab = state.currentTab;
                switchTab(currentTab === 'generate' ? 'scan' : 'generate');
            });
        }
        
        // ----------------------------------------
        // Initialize
        // ----------------------------------------
        function init() {
            cacheElements();
            setupEventListeners();
            
            // Generate initial empty QR
            const ctx = elements.qrCanvas.getContext('2d');
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, CONFIG.QR_SIZE, CONFIG.QR_SIZE);
            
            // Draw placeholder pattern
            ctx.strokeStyle = '#1f1f1f';
            ctx.lineWidth = 1;
            for (let i = 0; i < CONFIG.QR_SIZE; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CONFIG.QR_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CONFIG.QR_SIZE, i);
                ctx.stroke();
            }
            
            updateLivePreview();
            
            // Initialize character counts
            updateCharCount(elements.inputR, elements.countR);
            updateCharCount(elements.inputG, elements.countG);
            updateCharCount(elements.inputB, elements.countB);
            
            // Initialize audio context on first interaction
            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });
            
            console.log('RGB QR Ultra v4.0 initialized');
        }
        
        // Start app
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
    })();
    </script>
</body>
</html>
